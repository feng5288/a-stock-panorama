function renderThemes(){const themes=[...new Set(REPORT_ROWS.map(r=>r.old_theme).filter(Boolean))].sort();document.getElementById('theme').innerHTML='<option value="">全部旧主题</option>'+themes.map(t=>`<option>${esc(t)}</option>`).join('')}
function filtered(){return REPORT_ROWS.filter(r=>{if(theme&&r.old_theme!==theme)return false;if(statusVal&&r.legacy_status!==statusVal)return false;const blob=[r.code,r.name,r.old_theme,r.old_track,r.old_leaf,r.rating,r.legacy_status].join(' ').toLowerCase();return !q||blob.includes(q.toLowerCase())}).slice(0,500)}
