<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>首页1-9 V2报告后续批次计划</title><script src="core9_v2_report_batches_plan_v1.js"></script><style>:root{--ink:#111827;--muted:#667085;--line:#e5e7eb;--bg:#f7f8fb;--red:#b91c1c;--blue:#1d4ed8;--green:#166534;--amber:#9a3412}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;color:var(--ink)}header{padding:24px 28px;background:#111827;color:white}h1{margin:0 0 8px;font-size:26px}.sub{color:#d1d5db;font-size:13px;line-height:1.6}main{padding:22px 28px 48px}.nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}.nav a{background:white;border:1px solid var(--line);border-radius:8px;padding:8px 10px;text-decoration:none;color:#111827;font-size:13px}.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:0 0 18px}.metric{background:white;border:1px solid var(--line);border-radius:8px;padding:12px}.metric b{display:block;font-size:22px}.metric span{font-size:12px;color:var(--muted)}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0 16px}.toolbar input,.toolbar select{height:34px;border:1px solid var(--line);border-radius:6px;background:white;padding:0 10px}.concept{background:white;border:1px solid var(--line);border-radius:8px;margin-bottom:12px;overflow:hidden}.concept h2{margin:0;padding:14px 16px;background:#f3f4f6;font-size:18px}.stocks{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;padding:12px}.stock{border:1px solid var(--line);border-radius:8px;padding:10px;background:#fff}.stock b{font-size:14px}.tag{display:inline-flex;border-radius:999px;padding:3px 8px;font-size:12px;background:#f3f4f6;color:#374151}.new{background:#fee2e2;color:#991b1b}.v2{background:#dcfce7;color:#166534}.old{background:#fff7ed;color:#9a3412}.none{background:#f3f4f6;color:#374151}.small{font-size:12px;color:var(--muted);line-height:1.45}table{width:100%;border-collapse:collapse;background:white}th,td{border-bottom:1px solid var(--line);padding:9px 10px;text-align:left;font-size:13px;vertical-align:top}th{background:#f3f4f6}.card{background:white;border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:12px}</style></head><body><header><h1>首页1-9 V2报告后续批次计划</h1><div id="sub" class="sub"></div></header><main><div class="nav"><a href="core9_local_full_demo.html?v=demo1">本地完整演示版</a><a href="core9_v2_report_batch_001_generated.html?v=r1">batch_001报告</a><a href="core9_v2_report_batch_001_qc.html?v=q1">质检</a><a href="core9_v2_report_batches_plan.html?v=plan1">后续批次</a><a href="core9_classification_recalibration_after_batch001.html?v=rec1">分类校准</a></div><div id="app"></div></main><script>function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))}function metric(l,v){return '<div class="metric"><b>'+esc(v)+'</b><span>'+esc(l)+'</span></div>'}function cls(p){return p==='new_batch001'?'new':p==='v2_existing'?'v2':(p==='legacy_fallback'||p==='legacy_data')?'old':'none'}function label(p,s){return '<span class="tag '+cls(p)+'">'+esc(s)+'</span>'}const d=CORE9_V2_REPORT_BATCHES_PLAN_V1;document.getElementById('sub').textContent=d.purpose+' · '+d.generated_at;document.getElementById('app').innerHTML='<div class="summary">'+metric('batch_001已做',d.summary.batch_001_done)+metric('剩余公司',d.summary.remaining_companies)+metric('后续批次',d.summary.subsequent_batches)+'</div>'+d.batches.map(b=>'<div class="card"><h3>'+esc(b.batch)+' <span class="small">共 '+b.total+' 家，需新生成/升级 '+b.need_new_or_upgrade+' 家</span></h3><table><thead><tr><th>#</th><th>公司</th><th>主概念</th><th>状态</th><th>优先分</th></tr></thead><tbody>'+b.rows.map(r=>'<tr><td>'+r.batch_order+'</td><td>'+esc(r.code)+' '+esc(r.name)+'</td><td>'+esc(r.primary_concept_name)+'</td><td>'+esc(r.production_status)+'</td><td>'+esc(r.production_priority_score)+'</td></tr>').join('')+'</tbody></table></div>').join('');</script></body></html>
