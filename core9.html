<script>
const DATA = typeof CORE9_LOCAL_FULL_DEMO_V1 !== 'undefined' ? CORE9_LOCAL_FULL_DEMO_V1 : {summary:{}, concepts:[], rows:[]};
const DESCS = {

  ],
  optical_module:[
    {name:'光模块 / CPO', keys:['光模块','CPO','中际','新易盛','光迅','铭普']},
    {name:'光器件与光芯片', keys:['光器件','光芯片','光迅','铭普','激光']},

  ],
  pcb_high_speed:[
    {name:'高速PCB', keys:['沪电','胜宏','深南','东山','景旺','高速PCB','PCB']},
    {name:'封装基板 / IC载板', keys:['封装基板','IC载板','深南','兴森','载板']},
    {name:'覆铜板 / 树脂 / 铜箔', keys:['生益','覆铜板','铜箔','树脂','电子布','玻纤']},
    {name:'PCB制造与精密组件', keys:['东山','深南','胜宏','景旺','依顿','世运']}
  ],
  semiconductor:[
    {name:'半导体设备', keys:['设备','赛腾','北方','中微','华海清科','测试']},
    {name:'芯片设计 / 国产替代', keys:['芯片','设计','国产','海光','寒武纪','韦尔']},
    {name:'功率 / 模拟 / MCU', keys:['功率','模拟','MCU','台基','士兰']},
    {name:'半导体材料', keys:['材料','光刻胶','电子特气','彤程','三祥','硅片']}
  ],
  advanced_packaging:[

    {name:'先进封装 / Chiplet', keys:['先进封装','Chiplet','长电','通富']},
    {name:'封装基板与材料', keys:['基板','材料','雅克','兴森']},
    {name:'测试设备与服务', keys:['测试','设备','服务']}
  ],
  passive_components:[
    {name:'铝电解电容材料', keys:['新疆众和','电子铝箔','电极箔','铝箔']},
    {name:'电容器', keys:['电容','江海','艾华','法拉','风华']},
    {name:'电感 / 磁性元件', keys:['顺络','电感','磁性','磁材']},
    {name:'电子材料与上游', keys:['材料','元器件','陶瓷','薄膜']}
  ],
  comm_optical_infra:[
    {name:'光纤光缆', keys:['长飞','亨通','光纤','光缆','烽火']},
    {name:'光通信设备', keys:['光通信','通信设备','中兴','烽火','设备']},
    {name:'运营商 / IDC', keys:['运营','IDC','数据中心','中国移动','中国电信']},
    {name:'连接器与配套', keys:['连接器','配套','线缆','模块']}
  ],
  battery_storage:[
    {name:'动力电池', keys:['宁德','比亚迪','动力电池','电池']},
    {name:'储能系统', keys:['储能','阳光','逆变','PCS']},
    {name:'锂电材料', keys:['锂','正极','负极','电解液','隔膜','材料']},
    {name:'电力电子', keys:['电力电子','逆变器','变流器']}
  ],
  power_grid_uhv:[
    {name:'特高压设备', keys:['特高压','平高','许继','国电南瑞']},
    {name:'变压器 / 开关 / 继保', keys:['变压器','开关','继保','保护','电气']},
    {name:'电线电缆', keys:['电缆','线缆','起帆','通达','宝胜']},
    {name:'火电 / 电网运营配套', keys:['火电','电力','能源','运营','发电']}
  ]
};
let view = 'main';
let currentConcept = null;
let currentSub = null;
let query = '';
const $ = id => document.getElementById(id);
const esc = value => String(value ?? '').replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
const concepts = () => DATA.concepts.slice().sort((a,b)=>(a.seq||0)-(b.seq||0));
const conceptById = id => DATA.concepts.find(c => c.concept_id === id);
const conceptMeta = id => conceptById(id) || {rows:[], counts:{}};
const textOf = row => [row.name,row.code,row.concept_name,row.current_primary,row.source_type,row.source_decision,row.classification_reason,row.target_landing].filter(Boolean).join(' ');
const subTextOf = row => [row.name,row.code,row.current_primary,row.source_type,row.source_decision,row.classification_reason,row.next_action,row.batch_reason].filter(Boolean).join(' ');
function scoredRows(rows){return rows.slice().sort((a,b)=>rowWeight(b)-rowWeight(a) || String(a.code).localeCompare(String(b.code)));}
function rowWeight(row){return (Number(row.score)||0) + (row.report_priority === 'new_batch001' ? 300 : row.report_priority === 'v2_existing' ? 160 : row.report_priority === 'legacy_fallback' ? 40 : 0);}
function tier(row){const score = Number(row.score)||0;if(score >= 60) return 'leader';if(score >= 20) return 'focus';if(row.report_priority === 'new_batch001' || row.report_priority === 'v2_existing') return 'ready';if(row.report_priority === 'legacy_fallback' || row.report_priority === 'legacy_data') return 'legacy';return 'missing';}
function tierLabel(row){const score = Number(row.score)||0;if(score >= 60) return ['红','高评分'];if(score >= 20) return ['橙','重点跟踪'];if(row.report_priority === 'new_batch001' || row.report_priority === 'v2_existing') return ['蓝','新版报告'];if(row.report_priority === 'legacy_fallback' || row.report_priority === 'legacy_data') return ['灰','旧版兜底'];return ['灰','暂未生成'];}
function reportLabel(row){if(row.report_priority === 'new_batch001') return '新版报告';if(row.report_priority === 'v2_existing') return '已有V2';if(row.report_priority === 'legacy_fallback' || row.report_priority === 'legacy_data') return '旧版报告';return '暂未生成';}
function matches(row){if(!query) return true;const q = query.toLowerCase();return textOf(row).toLowerCase().includes(q);}
function subRows(conceptId, sub){const rows = conceptMeta(conceptId).rows || [];const found = rows.filter(row => sub.keys.some(key => subTextOf(row).includes(key))); return scoredRows(found.filter(matches));}
function renderMetrics(){const s = DATA.summary || {};$('metrics').innerHTML = [
  ['9','核心概念'],[s.unique_companies || 0,'公司池'],[s.batch001_reports || 0,'新版深度报告'],[s.legacy_fallback || 0,'旧版报告兜底']
].map(([n,label]) => `<div class="metric"><b>${esc(n)}</b><span>${esc(label)}</span></div>`).join('');}
function renderHotList(){const rows = scoredRows((DATA.rows || []).filter(r => r.report_priority === 'new_batch001' || Number(r.score) >= 60)).slice(0,4);$('hotList').innerHTML = rows.map(row => `<div class="hot-item" data-concept="${esc(row.concept_id)}"><b>${esc(row.name)} ${esc(row.code)}</b><span>${esc(row.concept_name)} · ${esc(reportLabel(row))}</span></div>`).join('');document.querySelectorAll('.hot-item').forEach(item => item.addEventListener('click', () => openConcept(item.dataset.concept)));}
function renderCrumb(){let html = `<button data-action="home">1-9 主干概念</button>`;if(currentConcept){const c = conceptById(currentConcept);html += `<button data-concept="${esc(currentConcept)}">${esc((c?.seq || '') + '. ' + (c?.concept_name || ''))}</button>`;}if(currentSub){html += `<button>${esc(currentSub.name)}</button>`;}$('crumb').innerHTML = html;$('crumb').querySelector('[data-action="home"]')?.addEventListener('click', goHome);$('crumb').querySelector('[data-concept]')?.addEventListener('click', event => openConcept(event.currentTarget.dataset.concept));}
function renderMain(){view='main';currentConcept=null;currentSub=null;renderCrumb();$('nodeDetail').innerHTML = '主干概念按 1-9 顺序展示。这里不直接堆股票，先让访问者理解网站的核心分类框架。';$('mainView').innerHTML = `<div class="grid">${concepts().map(c => {const count = (c.rows || []).length;const ready = (c.counts?.new_batch001 || 0) + (c.counts?.v2_existing || 0);const subs = SUBS[c.concept_id] || [];return `<article class="card concept-card" data-concept="${esc(c.concept_id)}"><div class="seq">${esc(c.seq)}</div><h3>${esc(c.seq)}. ${esc(c.concept_name)}</h3><p class="desc">${esc(DESCS[c.concept_id] || '点击进入细分概念。')}</p><div class="chips"><span class="chip blue">${count} 家公司</span><span class="chip green">${ready} 个新版入口</span><span class="chip">${subs.length} 个细分概念</span></div><div class="arrow">→</div></article>`;}).join('')}</div>`;document.querySelectorAll('.concept-card').forEach(card => card.addEventListener('click', () => openConcept(card.dataset.concept)));}
function openConcept(id){view='sub';currentConcept=id;currentSub=null;const c = conceptById(id);const subs = SUBS[id] || [];renderCrumb();const ready = (c?.counts?.new_batch001 || 0) + (c?.counts?.v2_existing || 0);$('nodeDetail').innerHTML = `<b>${esc(c?.seq || '')}. ${esc(c?.concept_name || '')}</b><br>${esc(DESCS[id] || '')}<br>当前公司关系：${esc((c?.rows || []).length)} 家；新版报告入口：${esc(ready)} 个。`;$('mainView').innerHTML = `<div class="grid">${subs.map((sub,index) => {const rows = subRows(id, sub);const readyCount = rows.filter(r => r.report_priority === 'new_batch001' || r.report_priority === 'v2_existing').length;return `<article class="card sub-card" data-index="${index}"><div class="seq">${index+1}</div><h3>${esc(index+1)}. ${esc(sub.name)}</h3><p class="desc">进入该细分概念后显示公司、评分颜色和报告入口。</p><div class="chips"><span class="chip blue">${rows.length} 家公司</span><span class="chip green">${readyCount} 个新版入口</span></div><div class="arrow">→</div></article>`;}).join('')}</div>`;document.querySelectorAll('.sub-card').forEach(card => card.addEventListener('click', () => openSub(id, subs[Number(card.dataset.index)])));}
function openSub(id, sub){view='stocks';currentConcept=id;currentSub=sub;renderCrumb();const rows = subRows(id, sub);$('nodeDetail').innerHTML = `<b>${esc(sub.name)}</b><br>这里是最细分概念层，因此显示股票名称、代码、评分、财务摘要和报告入口。颜色按评分与报告状态区分。`;if(!rows.length){$('mainView').innerHTML = `<div class="empty">当前关键词下暂未匹配到公司，后续会随 V2 报告和证据补充继续校准。</div>`;return;}$('mainView').innerHTML = `<div class="stocks">${rows.map(row => {const [chipColor, chipText] = tierLabel(row);const colorClass = chipColor === '红' ? 'red' : chipColor === '橙' ? 'orange' : chipColor === '蓝' ? 'blue' : '';const netProfit = row.net_profit_yi == null ? '--' : `${row.net_profit_yi} 亿`;const yoy = row.net_profit_yoy_pct == null ? '--' : `${row.net_profit_yoy_pct}%`;return `<article class="card stock-card ${tier(row)}"><div class="stock-head"><div><h3>${esc(row.name)}</h3><span class="code">${esc(row.code)} · ${esc(row.concept_name)}</span></div><span class="chip ${colorClass}">${esc(chipText)}</span></div><div class="facts"><div class="fact"><b>${esc(row.score ?? '--')}</b>评分</div><div class="fact"><b>${esc(netProfit)}</b>净利润</div><div class="fact"><b>${esc(yoy)}</b>同比</div></div><div class="chips"><span class="chip">${esc(row.improvement || '待复核')}</span><span class="chip">${esc(reportLabel(row))}</span></div>${row.local_report_link ? `<a class="report-link" target="_blank" href="${esc(row.local_report_link)}">打开报告</a>` : `<span class="muted-link">暂未生成</span>`}</article>`;}).join('')}</div>`;}
function goHome(){query='';$('search').value='';renderMain();}
function rerender(){if(view === 'stocks' && currentConcept && currentSub) openSub(currentConcept,currentSub);else if(view === 'sub' && currentConcept) openConcept(currentConcept);else renderMain();}
$('search').addEventListener('input', event => {query = event.target.value.trim();rerender();});$('homeBtn').addEventListener('click', goHome);renderMetrics();renderHotList();renderMain();
</script>
</body>
</html>
