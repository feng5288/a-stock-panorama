<style>
*{box-sizing:border-box}body{margin:0;background:#0d1117;color:#c9d1d9;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif}a{color:inherit;text-decoration:none}button,input{font:inherit}.top{position:sticky;top:0;z-index:50;background:rgba(13,17,23,.96);border-bottom:1px solid #21262d;backdrop-filter:blur(12px)}.top-inner{max-width:1480px;margin:0 auto;padding:13px 18px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}.brand{display:flex;align-items:center;gap:10px;font-weight:900;color:#f0f6fc;white-space:nowrap}.brand-mark{width:34px;height:34px;border-radius:8px;background:#1f6feb;display:grid;place-items:center;color:#fff}.brand small{display:block;color:#8b949e;font-size:12px;font-weight:500}.search{flex:1;min-width:280px}.search input{width:100%;height:39px;background:#161b22;border:1px solid #30363d;border-radius:8px;color:#c9d1d9;padding:0 13px;outline:none}.search input:focus{border-color:#58a6ff}.nav{display:flex;gap:8px;flex-wrap:wrap}.nav a,.btn{height:36px;border:1px solid #30363d;background:#161b22;color:#c9d1d9;border-radius:8px;padding:0 11px;display:inline-flex;align-items:center;cursor:pointer}.nav a:hover,.btn:hover{border-color:#58a6ff;color:#fff;background:#1b2736}.wrap{max-width:1480px;margin:0 auto;padding:16px 18px 42px}.hero{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:14px;margin-bottom:14px;align-items:start}.panel{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:14px}.hero-main{padding:20px}.eyebrow{display:inline-flex;border:1px solid #1f6feb55;background:#1f6feb22;color:#79c0ff;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:800}.hero h1{margin:12px 0 9px;font-size:31px;line-height:1.2;color:#f0f6fc;letter-spacing:0}.hero p{margin:0;color:#9da7b3;line-height:1.7}.kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:15px}.kpi{background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:12px}.kpi b{display:block;font-size:24px;color:#f0f6fc;line-height:1}.kpi span{display:block;margin-top:6px;color:#8b949e;font-size:12px}.layout{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:14px}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}.crumb{display:flex;gap:8px;flex-wrap:wrap}.crumb button{background:#0d1117;color:#c9d1d9;border:1px solid #30363d;border-radius:8px;padding:6px 9px;cursor:pointer}.crumb button:hover{border-color:#58a6ff;color:#fff}.section-title{font-size:17px;font-weight:900;color:#f0f6fc;margin:16px 0 10px}.section-title:first-child{margin-top:0}.section-note{font-size:12px;color:#8b949e;margin:-4px 0 11px;line-height:1.6}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(245px,1fr));gap:10px}.card{position:relative;background:#161b22;border:1px solid #21262d;border-radius:8px;padding:14px;min-height:132px;overflow:hidden;transition:.15s ease}.card.clickable{cursor:pointer}.card.clickable:hover{transform:translateY(-2px);border-color:#58a6ff;box-shadow:0 8px 22px rgba(0,0,0,.25)}.core-card{border-left:4px solid #f85149;background:linear-gradient(90deg,#2d1418 0,#161b22 23%)}.root-card{border-left:4px solid #58a6ff}.node-card{border-left:4px solid #8b949e}.node-card.pending{border-left-color:#d29922;background:linear-gradient(90deg,#2d240f 0,#161b22 22%)}.stock-card{border-left:4px solid #8b949e}.stock-card.strong{border-left-color:#f85149;background:linear-gradient(90deg,#2d1418 0,#161b22 22%)}.stock-card.watch{border-left-color:#d29922;background:linear-gradient(90deg,#2d240f 0,#161b22 22%)}.stock-card.ready{border-left-color:#58a6ff;background:linear-gradient(90deg,#10243a 0,#161b22 22%)}.seq{display:inline-flex;align-items:center;justify-content:center;min-width:28px;height:28px;border-radius:7px;background:#21262d;border:1px solid #30363d;color:#8b949e;font-weight:900;margin-bottom:10px}.title{font-size:18px;font-weight:900;color:#f0f6fc;line-height:1.28;padding-right:26px}.core-card .title{font-size:20px}.desc{margin-top:8px;color:#9da7b3;font-size:12px;line-height:1.55}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}.chip{display:inline-flex;align-items:center;border:1px solid #30363d;background:#0d1117;color:#9da7b3;border-radius:999px;padding:2px 7px;font-size:11px}.chip.blue{background:#1f6feb22;color:#79c0ff;border-color:#1f6feb55}.chip.red{background:#f8514922;color:#ffb3b3;border-color:#f8514955}.chip.gold{background:#d2992220;color:#e3b341;border-color:#d2992255}.chip.green{background:#23863622;color:#7ee787;border-color:#23863655}.arrow{position:absolute;right:13px;top:15px;color:#30363d;font-weight:900}.clickable:hover .arrow{color:#58a6ff}.side-list{display:grid;gap:8px}.side-item{background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:9px;cursor:pointer}.side-item:hover{border-color:#58a6ff}.side-item b{display:block;color:#f0f6fc;font-size:13px}.side-item span{display:block;margin-top:4px;color:#8b949e;font-size:11px}.node-detail{color:#9da7b3;font-size:13px;line-height:1.7}.legend{border-top:1px solid #21262d;margin-top:12px;padding-top:12px;display:grid;gap:8px}.legend div{display:flex;align-items:center;gap:8px;color:#9da7b3;font-size:12px}.dot{width:10px;height:10px;border-radius:50%;display:inline-block}.dot.red{background:#f85149}.dot.blue{background:#58a6ff}.dot.gold{background:#d29922}.dot.gray{background:#8b949e}.stocks{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}.stock-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.stock-head h3{font-size:17px;color:#f0f6fc;margin:0}.stock-head small{display:block;color:#8b949e;margin-top:3px}.facts{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;margin-top:10px}.fact{background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:7px;color:#8b949e;font-size:11px}.fact b{display:block;color:#c9d1d9;font-size:12px}.report-link,.muted-link{display:inline-flex;margin-top:10px;border-radius:8px;padding:7px 10px;font-size:12px}.report-link{background:#1f6feb;color:#fff}.muted-link{background:#21262d;color:#8b949e;border:1px solid #30363d}.empty{border:1px dashed #30363d;border-radius:8px;padding:40px;text-align:center;color:#8b949e;background:#0d1117}.pool-tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:0 0 10px}.toggle{border:1px solid #30363d;background:#0d1117;color:#c9d1d9;border-radius:999px;padding:6px 10px;font-size:12px;cursor:pointer}.toggle.active,.toggle:hover{border-color:#58a6ff;color:#fff;background:#1f6feb22}@media(max-width:1060px){.hero,.layout{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:700px){.top-inner{align-items:flex-start}.search{min-width:0;width:100%}.hero h1{font-size:24px}.grid,.stocks{grid-template-columns:1fr}.kpis{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="top"><div class="top-inner"><div class="brand"><div class="brand-mark">A</div><div>A股全景树<small>概念池 · 公司报告 · 动态分类</small></div></div><div class="search"><input id="search" placeholder="搜索公司、代码或概念，例如 PCB、MLCC、液冷、光纤、火电"></div><nav class="nav"><a href="core9.html?v=darkpool1">概念首页</a><a href="v2_report_samples_public.html?v=samples1">深度报告</a><a href="core9_v2_report_batches_plan.html?v=plan1">更新进度</a></nav></div></header>
<main class="wrap">
<section class="hero"><div class="panel hero-main"><span class="eyebrow">深色产品版</span><h1>先看核心主线，也能直接浏览完整概念池。</h1><p>上方保留 1-9 核心概念主线，下面把 1600+ 公司对应的完整概念池也放出来。已经重点处理的概念优先展示；暂未完成 V2 深度处理的概念先以旧报告和分类标签承接，后续再逐批校准。</p><div class="kpis" id="kpis"></div></div><aside class="panel"><h2 class="section-title">重点公司</h2><div class="side-list" id="hotList"></div></aside></section>
<section class="layout"><section class="panel"><div class="toolbar"><div class="crumb" id="crumb"></div><button class="btn" id="homeBtn">返回概念首页</button></div><div id="mainView"></div></section><aside class="panel"><h2 class="section-title">当前层级</h2><div class="node-detail" id="nodeDetail"></div><div class="legend"><div><span class="dot red"></span>红色：高评分 / 龙头候选</div><div><span class="dot blue"></span>蓝色：已有新版或重点入口</div><div><span class="dot gold"></span>金色：待补证据或待 V2</div><div><span class="dot gray"></span>灰色：旧报告兜底或普通节点</div></div></aside></section>
</main>
<script>
const CORE = typeof CORE9_LOCAL_FULL_DEMO_V1 !== 'undefined' ? CORE9_LOCAL_FULL_DEMO_V1 : {summary:{},concepts:[],rows:[]};
const FULL = typeof CLASSIFICATION_V2_INDEX !== 'undefined' ? CLASSIFICATION_V2_INDEX : {taxonomy:{nodes:[]},stocks_by_code:{},concepts:[]};
const V2 = typeof V2_REPORTS_INDEX !== 'undefined' ? V2_REPORTS_INDEX.reports_by_code || {} : {};
const LEGACY = typeof LEGACY_REPORTS_INDEX_V1 !== 'undefined' ? LEGACY_REPORTS_INDEX_V1.rows || [] : [];
const legacyByCode = {}; LEGACY.forEach(r => legacyByCode[String(r.code).padStart(6,'0')] = r);
const CORE_DESC = {ai_compute:'AI芯片、服务器链、数据中心、算力基础设施和配套环节。',optical_module:'光模块、CPO、光器件、光芯片和高速光互联。',pcb_high_speed:'高速PCB、HDI、封装基板、覆铜板、铜箔、树脂等上游材料。',semiconductor:'半导体设备、芯片设计、功率器件、材料与国产替代。',advanced_packaging:'封装测试、先进封装、Chiplet、封装基板和测试服务。',passive_components:'电容、电感、磁性元件、电子铝箔和被动元器件材料。',comm_optical_infra:'光纤光缆、通信网络、运营商基础设施和光通信设备。',battery_storage:'动力电池、储能系统、锂电材料和电力电子。',power_grid_uhv:'特高压、电网自动化、变压器、线缆和电力设备。'};
let mode='home', currentNode=null, query='', poolMode='roots';
const $=id=>document.getElementById(id); const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const nodes=()=>FULL.taxonomy&&FULL.taxonomy.nodes?FULL.taxonomy.nodes:[]; const roots=()=>nodes().filter(n=>!n.parent); const childrenOf=id=>nodes().filter(n=>n.parent===id); const nodeById=id=>nodes().find(n=>n.id===id); const conceptFor=id=>(FULL.concepts||[]).find(c=>c.node_id===id)||null; const allStocks=()=>Object.values(FULL.stocks_by_code||{});
function reportFor(code){code=String(code).padStart(6,'0'); if(V2[code]) return {url:V2[code].relative_path||('reports_v2/'+V2[code].file), label:'新版报告'}; if(legacyByCode[code]&&legacyByCode[code].html_report_path) return {url:legacyByCode[code].html_report_path,label:'旧版报告'}; return null;}
function textNode(n){return [n.name,(n.path||[]).join('/'),(n.raw_tags||[]).join('/'),n.id].join(' ')} function textStock(s){return [s.name,s.code,s.primary_industry,(s.secondary_tracks||[]).join('/'),(s.tags||[]).map(t=>t.name+' '+t.node_name).join('/')].join(' ')}
function stockRowsForNode(id){let c=conceptFor(id); let rows=c&&c.stocks?c.stocks.map(x=>Object.assign({},FULL.stocks_by_code[x.code]||{},x)):allStocks().filter(s=>(s.tags||[]).some(t=>t.node_id===id)); return rows.sort((a,b)=>(Number(b.weight)||0)-(Number(a.weight)||0)||String(a.code).localeCompare(String(b.code)));}
function nodeStatus(n){let c=conceptFor(n.id); if(!c) return {label:'待接入', cls:'gold'}; if((c.high_confidence_count||0)>0) return {label:'已分类', cls:'blue'}; return {label:'待V2', cls:'gold'};}
function renderKpis(){let s=CORE.summary||{};$('kpis').innerHTML=[[CORE.concepts.length||9,'核心主线'],[nodes().length,'概念节点'],[Object.keys(FULL.stocks_by_code||{}).length,'公司报告池'],[s.batch001_reports||20,'新版V2报告']].map(x=>`<div class="kpi"><b>${esc(x[0])}</b><span>${esc(x[1])}</span></div>`).join('')}
function renderHot(){let rows=[...(CORE.rows||[])].sort((a,b)=>(Number(b.score)||0)-(Number(a.score)||0)).slice(0,5);$('hotList').innerHTML=rows.map(r=>`<div class="side-item" data-code="${esc(r.code)}"><b>${esc(r.name)} ${esc(r.code)}</b><span>${esc(r.concept_name)} · ${esc(r.local_report_status||'报告入口')}</span></div>`).join('')}
function renderCrumb(){let html=`<button data-home="1">概念首页</button>`; if(currentNode){let n=nodeById(currentNode); (n&&n.path?n.path:[n?n.name:'']).forEach((name,i)=>{html+=`<button>${esc(name)}</button>`})} $('crumb').innerHTML=html; $('crumb').querySelector('[data-home]')?.addEventListener('click',goHome)}
function coreCard(c){let ready=(c.counts?.new_batch001||0)+(c.counts?.v2_existing||0);return `<article class="card clickable core-card" data-core="${esc(c.concept_id)}"><div class="seq">${esc(c.seq)}</div><div class="title">${esc(c.seq)}. ${esc(c.concept_name)}</div><div class="desc">${esc(CORE_DESC[c.concept_id]||'核心概念主线。')}</div><div class="chips"><span class="chip red">${esc((c.rows||[]).length)} 家</span><span class="chip blue">${ready} 个新版入口</span></div><div class="arrow">→</div></article>`}
function nodeCard(n,i,root){let ch=childrenOf(n.id).length, c=conceptFor(n.id), status=nodeStatus(n); return `<article class="card clickable ${root?'root-card':'node-card'} ${status.cls==='gold'?'pending':''}" data-node="${esc(n.id)}"><div class="seq">${root?i+1:'•'}</div><div class="title">${esc(n.name)}</div><div class="desc">${esc((n.path||[n.name]).join(' / '))}</div><div class="chips"><span class="chip ${status.cls}">${esc(status.label)}</span><span class="chip">${esc(ch)} 个子概念</span><span class="chip">${esc(n.stock_count||c?.stock_count||0)} 家</span></div><div class="arrow">→</div></article>`}
function stockCard(s){let rep=reportFor(s.code), fs=s.financial_signal||{}, grade=(Number(s.weight)||0)>=.9?'strong':rep?'ready':'watch';return `<article class="card stock-card ${grade}"><div class="stock-head"><div><h3>${esc(s.name)}</h3><small>${esc(s.code)} · ${esc(s.primary_industry||s.role||'未分类')}</small></div><span class="chip ${grade==='strong'?'red':grade==='ready'?'blue':'gold'}">${esc(s.evidence_level||s.role||'待复核')}</span></div><div class="facts"><div class="fact"><b>${esc(s.weight??'--')}</b>权重</div><div class="fact"><b>${esc(typeof fs.net_profit_yi==='number'?fs.net_profit_yi+'亿':'--')}</b>净利润</div><div class="fact"><b>${esc(typeof fs.yoy_parent_net_income_pct==='number'?fs.yoy_parent_net_income_pct+'%':'--')}</b>同比</div></div><div class="chips"><span class="chip">${esc(s.tag||s.primary_industry||'分类标签')}</span></div>${rep?`<a class="report-link" target="_blank" href="${esc(rep.url)}">打开${esc(rep.label)}</a>`:`<span class="muted-link">暂未生成</span>`}</article>`}
function renderHome(){mode='home';currentNode=null;renderCrumb();$('nodeDetail').innerHTML='首页先展示 1-9 核心主线，同时保留完整概念池。未处理完的节点不会删除，会以“待V2/待接入”状态先展示。';let core=CORE.concepts.slice().sort((a,b)=>(a.seq||0)-(b.seq||0));let pool=poolMode==='roots'?roots():nodes(); if(query){pool=nodes().filter(n=>textNode(n).includes(query));}
$('mainView').innerHTML=`<div class="section-title">1-9 核心主线</div><div class="section-note">这是明天优先讲清楚的重点入口，不代表只有这些概念。</div><div class="grid">${core.map(coreCard).join('')}</div><div class="section-title">完整概念池</div><div class="section-note">已接入 ${nodes().length} 个概念节点。暂未完成 V2 的概念先放出来，后续按批次补证据和报告。</div><div class="pool-tools"><button class="toggle ${poolMode==='roots'?'active':''}" data-pool="roots">主分类 ${roots().length}</button><button class="toggle ${poolMode==='all'?'active':''}" data-pool="all">全部节点 ${nodes().length}</button></div><div class="grid">${pool.map((n,i)=>nodeCard(n,i,!n.parent)).join('')}</div>`; bindCards();}
function renderNode(id){mode='node';currentNode=id;renderCrumb();let n=nodeById(id); if(!n){renderHome();return} let kids=childrenOf(id); let rows=stockRowsForNode(id).filter(s=>!query||textStock(s).includes(query));$('nodeDetail').innerHTML=`<b>${esc(n.name)}</b><br>路径：${esc((n.path||[n.name]).join(' / '))}<br>子概念：${kids.length} 个；关联公司：${rows.length || n.stock_count || 0} 家。`; if(kids.length&&!query){$('mainView').innerHTML=`<div class="section-title">${esc(n.name)} 的子概念</div><div class="grid">${kids.map((x,i)=>nodeCard(x,i,false)).join('')}</div>`}else{$('mainView').innerHTML=rows.length?`<div class="section-title">${esc(n.name)} 相关公司</div><div class="stocks">${rows.map(stockCard).join('')}</div>`:`<div class="empty">这个概念暂时没有匹配到公司，先保留为待补节点。</div>`} bindCards();}
function renderSearch(){let ns=nodes().filter(n=>textNode(n).includes(query)).slice(0,160), ss=allStocks().filter(s=>textStock(s).includes(query)).slice(0,80);renderCrumb();$('nodeDetail').innerHTML=`搜索：${esc(query)}。概念和公司都会显示，便于快速确认是否漏概念。`;$('mainView').innerHTML=`<div class="section-title">匹配概念</div><div class="grid">${ns.map((n,i)=>nodeCard(n,i,!n.parent)).join('')||'<div class="empty">没有匹配概念</div>'}</div><div class="section-title">匹配公司</div><div class="stocks">${ss.map(stockCard).join('')||'<div class="empty">没有匹配公司</div>'}</div>`;bindCards();}
function bindCards(){document.querySelectorAll('[data-node]').forEach(el=>el.addEventListener('click',()=>{query='';$('search').value='';renderNode(el.dataset.node)}));document.querySelectorAll('[data-core]').forEach(el=>el.addEventListener('click',()=>{let id=el.dataset.core;let mapped={optical_module:'main_cpo',pcb_high_speed:'main_pcb',optical_infra:'communications',grid_uhv:'renewable_power'}[id]||id;renderNode(nodeById(mapped)?mapped:id)}));document.querySelectorAll('[data-pool]').forEach(el=>el.addEventListener('click',()=>{poolMode=el.dataset.pool;renderHome()}));}
function goHome(){query='';$('search').value='';renderHome()} $('homeBtn').addEventListener('click',goHome);$('search').addEventListener('input',e=>{query=e.target.value.trim(); if(query)renderSearch(); else if(mode==='node'&&currentNode)renderNode(currentNode); else renderHome();});renderKpis();renderHot();renderHome();
</script>
</body>
</html>
