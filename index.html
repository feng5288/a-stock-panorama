<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股投资全景树</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}
#app{max-width:1400px;margin:0 auto;padding:0 20px 40px}
#topbar{position:sticky;top:0;z-index:100;background:#0d1117;padding:14px 0 10px;border-bottom:1px solid #21262d;margin-bottom:16px}
#topbar .inner{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
#topbar h1{font-size:18px;color:#58a6ff;white-space:nowrap}
#topbar .search{flex:1;min-width:180px}
#topbar .search input{width:100%;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:8px 14px;color:#c9d1d9;font-size:13px;outline:none;transition:border-color .2s}
#topbar .search input:focus{border-color:#58a6ff}
#topbar .search input::placeholder{color:#484f58}
#topbar .info{font-size:11px;color:#8b949e;display:flex;align-items:center;gap:8px}
#breadcrumb{display:flex;align-items:center;gap:6px;padding:0 0 14px;flex-wrap:wrap}
#breadcrumb .crumb{font-size:12px;padding:4px 12px;border-radius:6px;cursor:pointer;background:#21262d;color:#8b949e;border:1px solid transparent;transition:all .15s}
#breadcrumb .crumb:hover{background:#30363d;color:#c9d1d9;border-color:#484f58}
#breadcrumb .crumb.active{background:#1f6feb22;color:#58a6ff;border-color:#1f6feb44;cursor:default}
#breadcrumb .sep{color:#30363d;font-size:14px}
#breadcrumb .back{font-size:15px;padding:7px 16px;border-radius:8px;cursor:pointer;background:#da363322;color:#f85149;border:1px solid #da363344;transition:all .15s;font-weight:700}
#breadcrumb .back:hover{background:#da363344;transform:scale(1.05)}
#content{margin-top:8px}
.level-title{font-size:13px;color:#8b949e;margin-bottom:14px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
.card{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:16px 18px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:8px;position:relative;overflow:hidden}
.card:hover{border-color:#30363d;transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.card:active{transform:translateY(0)}
.card .icon{font-size:22px}
.card .name{font-size:15px;font-weight:600;color:#c9d1d9;line-height:1.3}
.card .meta{font-size:11px;color:#484f58;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.card .meta .badge{background:#21262d;padding:2px 8px;border-radius:8px}
.card .multi-tag{font-size:10px;background:#d2a8ff22;color:#d2a8ff;padding:1px 6px;border-radius:6px;margin-left:4px}
.card .arrow{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:18px;color:#30363d;transition:all .2s}
.card:hover .arrow{color:#58a6ff;right:10px}
.card.theme{border-left:3px solid #d2a8ff}
.card.track{border-left:3px solid #8b949e}
.card.sub{border-left:3px solid #484f58}
.card.stock{border-left:3px solid #1f6feb}
.card.stock-a{border-left:4px solid #238636;background:#23863608}
.card.stock-b{border-left:4px solid #1f6feb;background:#1f6feb08}
.card.stock-c{border-left:4px solid #d29922;background:#d2992208}
.card.stock-d{border-left:4px solid #da3633;background:#da363308}
.card.stock-q{border-left:4px solid #6e7681;background:#6e768108}
.card.stock-hot{border-left:4px solid #f0883e;background:#f0883e0a;box-shadow:0 0 12px rgba(240,136,62,.15)}
.card.stock-hot-a{border-left:4px solid #3fb950;box-shadow:0 0 14px rgba(63,185,80,.2)}
.card.stock-hot-b{border-left:4px solid #58a6ff;box-shadow:0 0 12px rgba(88,166,255,.15)}
.card.stock-hot-c{border-left:4px solid #e3b341;box-shadow:0 0 10px rgba(227,179,65,.12)}
#heat-toggle{background:#21262d;border:1px solid #30363d;color:#8b949e;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap;order:-1}
#heat-toggle:hover{background:#30363d;color:#c9d1d9}
#heat-toggle.active{background:#f0883e22;color:#f0883e;border-color:#f0883e44}
.heat-badge{display:inline-block;background:#f0883e22;color:#f0883e;font-size:10px;padding:1px 6px;border-radius:6px;margin-left:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:.7}50%{opacity:1}}
.empty{text-align:center;padding:60px 20px;color:#484f58}
.empty .eicon{font-size:48px;margin-bottom:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;max-width:560px;width:94%;max-height:85vh;overflow-y:auto}
.modal.report-modal{max-width:1120px;width:96vw;max-height:92vh;padding:16px;overflow-y:auto}
.modal.report-modal h3{font-size:16px;margin-bottom:2px}
.modal.report-modal .m-code{margin-bottom:8px}
.modal.report-modal .m-row{padding:4px 0}
.modal.report-modal .m-summary{max-height:76px;overflow:auto;margin-top:8px;padding:8px}
.modal.report-modal .m-path-box{margin-top:10px;padding:8px}
#report-iframe{width:100%;height:min(72vh,760px);border:1px solid #30363d;border-radius:8px;background:#fff;margin-top:6px}
.modal h3{font-size:18px;margin-bottom:4px}
.modal .m-code{font-size:12px;color:#8b949e;margin-bottom:14px}
.modal .m-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #21262d;font-size:13px}
.modal .m-label{color:#8b949e}
.modal .m-value{color:#c9d1d9;font-weight:500}
.modal .m-close{float:right;background:none;border:none;color:#8b949e;font-size:20px;cursor:pointer;padding:4px 8px}
.modal .m-close:hover{color:#c9d1d9}
.modal .m-summary{margin-top:12px;font-size:13px;color:#8b949e;line-height:1.6;padding:10px;background:#0d1117;border-radius:8px;border:1px solid #21262d}
.modal .m-path-box{margin-top:14px;padding:12px;background:#0d1117;border:1px solid #30363d;border-radius:8px;font-size:12px}
.modal .m-path-box .ptitle{color:#8b949e;margin-bottom:6px;font-weight:600}
.modal .m-path-box .ppath{color:#58a6ff;font-family:'Cascadia Code','Consolas',monospace;font-size:11px;word-break:break-all;line-height:1.5;background:#161b22;padding:8px 10px;border-radius:4px;margin:4px 0}
.modal .m-path-box .dl-btn{display:inline-block;margin-top:6px;padding:8px 20px;background:#238636;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;text-decoration:none;font-weight:600;transition:all .15s}
.modal .m-path-box .dl-btn:hover{background:#2ea043;transform:scale(1.03)}
.modal .m-note-old{font-size:12px;color:#d29922;margin-top:8px;padding:8px 12px;background:#d2992211;border:1px solid #d2992233;border-radius:6px}
.modal .m-locations{margin-top:12px;font-size:12px;color:#8b949e;line-height:1.8}
.modal .m-locations .loc-link{color:#58a6ff;cursor:pointer;text-decoration:underline}
.modal .m-locations .loc-link:hover{color:#79c0ff}
#footer{text-align:center;padding:30px 0 20px;font-size:10px;color:#21262d;border-top:1px solid #161b22;margin-top:20px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeIn .25s ease-out}
@media(max-width:768px){.card-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}.card{padding:12px 14px}.card .name{font-size:13px}.modal.report-modal{width:98vw;max-height:94vh;padding:10px}#report-iframe{height:70vh}}
</style>
</head>

 var pct=(typeof v.pct==='number')?v.pct:(typeof v.heat==='number'?v.heat:null);
 var h=v.heat||'';
 if(typeof h==='string'){if(h==='hot')pct=9;else if(h==='warm')pct=5;else if(h==='cold')pct=2;else pct=pct||0}
 if(!pct&&v.maxChg)pct=Math.min(v.maxChg,9);
 var name=v.name||(v.concepts&&v.concepts.length?v.concepts[0]:'热点');
 return{pct:pct,name:name};
}
function heatBadgeHTML(h){
 if(!h||h.pct===null||h.pct===undefined||h.pct<=0)return'';
 var e=h.pct>=8?'🔥':h.pct>=5?'✨':'📈';
 return'<span class="heat-badge">'+e+' '+h.name+' H'+h.pct.toFixed(1)+'</span>';
}
function heatGlowClass(h){
 if(!h||h.pct===null||h.pct===undefined||h.pct<=0)return'';
 if(h.pct>=5)return' stock-hot-a';
 if(h.pct>=3)return' stock-hot-b';
 return' stock-hot-c';
}
function toggleHeatOnly(){
 HEAT_MODE=1;
 var b=document.getElementById('heat-toggle');
 b.classList.add('active');
 b.textContent='🔥 概念雷达';
 render();
 openConceptRadar();
}
function escHTML(v){return String(v==null?'':v).replace(/[&<>"']/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]})}
function openConceptRadar(){
 var m=document.getElementById('modal-overlay');
 if(!m.hasAttribute('data-style-fixed')){
  m.setAttribute('data-style-fixed','1');
  m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s';
 }
 var d=CONCEPT_HEAT, body='';
 if(!d){
  body='<div class="m-summary">概念雷达数据正在加载或暂不可用。请稍后刷新页面。</div>';
 }else{
  var concepts=d.hot_concepts||[], stocks=d.hot_stocks||[], ms=d.market_summary||{};
  body+='<div class="m-code">交易日：'+escHTML(d.trade_date||'')+' ｜ 更新：'+escHTML(d.updated||d.update_time||'')+'</div>';
  body+='<div class="m-summary">'+escHTML(d.market_note||'暂无市场摘要')+'</div>';
  body+='<div class="m-row"><span class="m-label">沪指</span><span class="m-value">'+escHTML(ms.sh_index||'--')+'</span></div>';
  body+='<div class="m-row"><span class="m-label">深成指 / 创业板</span><span class="m-value">'+escHTML(ms.sz_index||'--')+' / '+escHTML(ms.cy_index||'--')+'</span></div>';
  body+='<div class="m-row"><span class="m-label">成交额</span><span class="m-value">'+escHTML(ms.volume_trillion||'--')+' 万亿</span></div>';
  body+='<h3 style="font-size:15px;margin:16px 0 8px;color:#f0883e">今日热门概念</h3>';
  if(concepts.length===0){body+='<div class="m-summary">暂无热门概念数据。</div>'}
  concepts.forEach(function(c){
   body+='<div class="m-row"><span class="m-label">'+escHTML(c.name)+'</span><span class="m-value">H'+Number(c.heat_pct||0).toFixed(1)+' ｜ 命中 '+escHTML(c.matched_stocks_count||0)+' 只</span></div>';
   if(c.note)body+='<div style="font-size:12px;color:#8b949e;line-height:1.5;padding:4px 0 8px;border-bottom:1px solid #21262d">'+escHTML(c.note)+'</div>';
  });
  body+='<h3 style="font-size:15px;margin:16px 0 8px;color:#58a6ff">池子命中股票 TOP10</h3>';
  if(stocks.length===0){body+='<div class="m-summary">今日热门概念暂未命中池子股票。</div>'}
  stocks.slice(0,10).forEach(function(s){
   var conceptsText=(s.matched_concepts||[]).join(' / ');
   body+='<div class="m-row" style="gap:12px"><span class="m-label">'+escHTML(s.code)+' '+escHTML(s.name)+'</span><span class="m-value">'+escHTML(s.rating||'?')+' ｜ H'+Number(s.heat_score||0).toFixed(1)+'</span></div>';
   body+='<div style="font-size:12px;color:#8b949e;line-height:1.5;padding:0 0 8px;border-bottom:1px solid #21262d">'+escHTML(conceptsText)+'</div>';
  });
  body+='<div class="m-note-old">提示：打开概念雷达时会同步开启股票卡片热点高亮。数据来自盘后概念输入与网站股票池映射，未命中的概念不会强行配股票。</div>';
 }
 m.innerHTML='<div class="modal" onclick="event.stopPropagation()" style="max-width:760px"><button class="m-close" onclick="closeModal()">×</button><h3 style="color:#f0883e">🔥 今日概念雷达</h3>'+body+'</div>';
 m.style.opacity='1';
 m.style.pointerEvents='auto';
}

/* --- Modal --- */
function openStockDetail(stock){
 var m=document.getElementById('modal-overlay');
 if(!m.hasAttribute('data-style-fixed')){
  m.setAttribute('data-style-fixed','1');
  m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s';
 }
 var r=getRating(stock),sc=getScoreStr(stock),sum=getSummary(stock),rf=getReportFile(stock),hr=hasReport(stock),sid=stock.id||stock.code;
 var c='#6e7681';
 if(r.charAt(0)==='A')c='#3fb950';else if(r.charAt(0)==='B')c='#58a6ff';else if(r.charAt(0)==='C')c='#e3b341';else if(r.charAt(0)==='D')c='#f85149';
 var dl='';
 if(hr&&rf){
  var hf=rf.replace('.docx','.html'),pu='reports/'+encodeURIComponent(hf);
  dl='<div class="m-path-box report-frame-box"><div class="ptitle">📄 完整分析报告</div><div id="iframe-err" style="display:none;color:#f85149;font-size:12px;margin:8px 0">⚠ 报告加载失败</div><iframe id="report-iframe" src="'+pu+'" sandbox="allow-same-origin allow-scripts"></iframe></div>';
 }else{dl='<div class="m-path-box"><div class="ptitle">📄 完整分析报告</div><div style="color:#484f58">暂无报告文件</div></div>'}
 var loc='',ps=stockPaths[sid]||[];
 if(ps.length>1){loc='<div class="m-locations">📍 同时归属：';ps.forEach(function(p,i){loc+='<br>  <a class="loc-link" onclick="navigateToStock(\''+sid+'\',\''+p.sub+'\')">'+p.theme+' → '+p.track+' → '+p.sub+'</a>'});loc+='</div>'}
 var note=r==='?'?'<div class="m-note-old">⚠ 此报告生成于早期模板，未包含正式评级</div>':'';
 var modalClass=(hr&&rf)?'modal report-modal':'modal';
 m.innerHTML='<div class="'+modalClass+'" onclick="event.stopPropagation()"><button class="m-close" onclick="closeModal()">×</button><h3 style="color:'+c+'">'+stock.name+'</h3><div class="m-code">'+stock.code+'</div><div class="m-row"><span class="m-label">评级</span><span class="m-value" style="color:'+c+'">'+fmtRating(r)+'</span></div><div class="m-row"><span class="m-label">综合评分</span><span class="m-value">'+sc+'</span></div><div class="m-summary">📝 '+sum+'</div>'+loc+note+dl+'</div>';
 m.style.opacity='1';m.style.pointerEvents='auto';
 setTimeout(function(){
  var ifr=document.getElementById('report-iframe');
  if(ifr){ifr.onerror=function(){document.getElementById('iframe-err').style.display='block'};ifr.onload=function(){try{var d=ifr.contentDocument||ifr.contentWindow.document;if(!d||!d.body||d.body.innerHTML.trim()==='')document.getElementById('iframe-err').style.display='block'}catch(e){}}}
 },10);
}
function closeModal(){var m=document.getElementById('modal-overlay');m.style.opacity='0';m.style.pointerEvents='none';var f=document.getElementById('report-iframe');if(f)f.src='about:blank'}

/* --- Search --- */
function onSearchKey(e){
 if(e.key!=='Enter')return;
 var q=document.getElementById('search').value.trim();
 if(!q)return;
 var s=stockIndex[q];
 if(s&&typeof s==='object'){navigateToStock(s.id||s.code,null);document.getElementById('search').value='';return}
 var ql=q.toLowerCase(),ks=Object.keys(stockIndex);
 for(var i=0;i<ks.length;i++){
  var k=ks[i],v=stockIndex[k];
  if(typeof v!=='object'||!v.code)continue;
  if(k.toLowerCase().indexOf(ql)===0||k.indexOf(q)>=0){navigateToStock(v.id||v.code,null);document.getElementById('search').value='';return}
 }
 filterCards(q);
}
function onSearchInput(val){
 if(!val||val.length<2){render();return}
 var s=stockIndex[val];
 if(!s||typeof s!=='object'){
  var ql=val.toLowerCase(),ks=Object.keys(stockIndex);
  for(var i=0;i<ks.length;i++){var k=ks[i],v=stockIndex[k];if(typeof v!=='object'||!v.code)continue;if(k.toLowerCase().indexOf(ql)===0||k.indexOf(val)>=0){s=v;break}}
 }
 if(s&&typeof s==='object')showSearchPreview(s,val);else filterCards(val);
}
function showSearchPreview(stock,q){
 var ct=document.getElementById('content');
 ct.innerHTML='<div class="level-title">🔍 搜索匹配 · '+stock.name+'</div>';
 var g=document.createElement('div');g.className='card-grid';
 var r=getRating(stock),rc={'A':'stock-a','B':'stock-b','C':'stock-c','D':'stock-d'}[r.charAt(0)]||'stock-q';
 var em={'A':'🟢','B':'🔵','C':'🟡','D':'🔴'}[r.charAt(0)]||'⚪';
 var sc=getScoreStr(stock),sid=stock.id||stock.code,ps=stockPaths[sid]||[];
 var ht=HEAT_MODE===1?getHeatInfo(stock.code):null,hb=HEAT_MODE===1?heatBadgeHTML(ht):'';
 var hr=hasReport(stock)?' 📄':'';
 ps.forEach(function(p,i){
  var c=document.createElement('div');c.className='card stock '+rc;
  var ll=i===0?'':' ('+(i+1)+')';
  c.innerHTML='<div class="icon">'+em+'</div><div class="name">'+stock.name+hr+ll+hb+' <span style="font-size:11px;color:#8b949e">'+stock.code+'</span></div><div class="meta"><span class="badge">'+fmtRating(r)+' '+sc+'</span><span style="font-size:10px;color:#58a6ff">📍 '+p.theme+' → '+p.track+' → '+p.sub+'</span></div><div class="arrow">→</div>';
  c.onclick=function(e){e.stopPropagation();navigateToStock(sid,p.sub);document.getElementById('search').value=''};
  g.appendChild(c);
 });
 ct.appendChild(g);
}
function navigateToStock(sid,prefSub){
 if(!sid)return;
 var ps=stockPaths[sid]||[];if(ps.length===0)return;
 var tp=ps[0];
 if(prefSub)for(var i=0;i<ps.length;i++){if(ps[i].sub===prefSub){tp=ps[i];break}}
 navStack=[{node:TREE,idx:-1}];
 if(!TREE.children)return;
 var tn=TREE.children.find(function(c){return c&&c.name===tp.theme});if(!tn)return;
 navStack.push({node:tn,idx:1});
 if(!tn.children)return;
 var rn=tn.children.find(function(c){return c&&c.name===tp.track});if(!rn)return;
 navStack.push({node:rn,idx:2});
 if(!rn.children)return;
 var sn=rn.children.find(function(c){return c&&c.name===tp.sub});if(!sn)return;
 navStack.push({node:sn,idx:3});
 render();
}
function filterCards(q){
 if(!q){render();return}
 var ql=q.toLowerCase(),cur=current(),children=cur.node.children||[],ct=document.getElementById('content');
 var filt=children.filter(function(c){
  if(c.name.toLowerCase().indexOf(ql)>=0)return!0;
  if(c.children&&c.children.some(function(s){return s.name.toLowerCase().indexOf(ql)>=0||(s.code||'').indexOf(ql)>=0}))return!0;
  return!1;
 });
 ct.innerHTML='';
 if(filt.length===0){ct.innerHTML='<div class="empty"><div class="eicon">🔍</div><div class="etext">未找到 "'+q+'" 的内容</div></div>';return}
 ct.innerHTML='<div class="level-title">🔍 筛选结果：'+filt.length+' 项</div>';
 var g=document.createElement('div');g.className='card-grid';
 filt.forEach(function(c){
  var card=document.createElement('div');
  if(c.type==='stock'){
   var r=getRating(c),rc={'A':'stock-a','B':'stock-b','C':'stock-c','D':'stock-d'}[r.charAt(0)]||'stock-q';
   var em={'A':'🟢','B':'🔵','C':'🟡','D':'🔴'}[r.charAt(0)]||'⚪';
   var sc=getScoreStr(c),h2=HEAT_MODE===1?getHeatInfo(c.code):null,hb2=HEAT_MODE===1?heatBadgeHTML(h2):'',gl2=HEAT_MODE===1?heatGlowClass(h2):'';
   card.className='card stock '+rc+gl2;
   card.innerHTML='<div class="icon">'+em+'</div><div class="name">'+hl(c.name,q)+hb2+' <span style="font-size:11px;color:#8b949e">'+c.code+'</span></div><div class="meta"><span class="badge">'+fmtRating(r)+' '+sc+'</span></div>';
   card.onclick=function(e){e.stopPropagation();navigateToStock(c.id||c.code,null)};
  }else{
   card.className='card '+c.type;
   var im={'theme':'📂','track':'📁','sub':'🏷'},cnt=(c.children||[]).length,has=cnt>0;
   card.innerHTML='<div class="icon">'+(im[c.type]||'📄')+'</div><div class="name">'+hl(c.name,q)+'</div><div class="meta">'+(has?'<span class="badge">'+cnt+'个</span>':'')+'</div><div class="arrow">'+(has?'→':'')+'</div>';
   if(has)card.onclick=function(){navStack.push({node:c,idx:navStack.length});render();document.getElementById('search').value=''};
  }
  g.appendChild(card);
 });
 ct.appendChild(g);
}
function hl(text,q){var i=text.toLowerCase().indexOf(q.toLowerCase());if(i<0)return text;return text.substring(0,i)+'<span style="color:#e3b341;font-weight:700">'+text.substring(i,i+q.length)+'</span>'+text.substring(i+q.length)}

/* --- Render --- */
function render(){
 var cur=current(),children=cur.node.children||[],bc=document.getElementById('breadcrumb'),ct=document.getElementById('content');
 bc.innerHTML='';
 if(navStack.length>1){
  var bk=document.createElement('span');bk.className='back';bk.textContent='← 返回上级';bk.onclick=function(){navStack.pop();render()};bc.appendChild(bk);
  var sp=document.createElement('span');sp.className='sep';sp.textContent='|';bc.appendChild(sp);
 }
 for(var i=0;i<navStack.length;i++){
  var s=navStack[i];if(i>0){var se=document.createElement('span');se.className='sep';se.textContent='›';bc.appendChild(se)}
  var cr=document.createElement('span');cr.className='crumb'+(i===navStack.length-1?' active':'');cr.textContent=s.node.name;
  if(i<navStack.length-1){(function(idx){cr.onclick=function(){navStack=navStack.slice(0,idx+1);render()}})(i)}
  bc.appendChild(cr);
 }
 ct.innerHTML='';
 if(!children||children.length===0){ct.innerHTML='<div class="empty"><div class="eicon">🔭</div><div class="etext">暂无子分类</div></div>';return}
 var nt=cur.node.type||'root',lm={root:'大赛道',theme:'子板块',track:'概念细分',sub:'股票'},nm={root:'赛道',theme:'子板块',track:'概念'};
 var lb=lm[nt]||'',nn=nm[nt]||'项';
 if(lb){var t=document.createElement('div');t.className='level-title';t.textContent=lb+' · '+children.length+' 个'+nn;ct.appendChild(t)}
 var g=document.createElement('div');g.className='card-grid';
 var sorted=children.slice().sort(function(a,b){var ad=a.type!=='stock',bd=b.type!=='stock';if(ad!==bd)return ad?-1:1;if(a.type==='stock')return getScore(b)-getScore(a);return 0});
 sorted.forEach(function(c){
  var card=document.createElement('div');
  if(c.type==='stock'){
   var r=getRating(c),rc='stock-q';if(r.charAt(0)==='A')rc='stock-a';else if(r.charAt(0)==='B')rc='stock-b';else if(r.charAt(0)==='C')rc='stock-c';else if(r.charAt(0)==='D')rc='stock-d';
   var em={'A':'🟢','B':'🔵','C':'🟡','D':'🔴'}[r.charAt(0)]||'⚪',sc=getScoreStr(c),hr=hasReport(c)?' 📄':'',mt='',sid=c.id||c.code;
   if(stockPaths[sid]&&stockPaths[sid].length>1)mt='<span class="multi-tag">×'+stockPaths[sid].length+'</span>';
   var ht=HEAT_MODE===1?getHeatInfo(c.code):null,hb=HEAT_MODE===1?heatBadgeHTML(ht):'',gl=HEAT_MODE===1?heatGlowClass(ht):'';
   card.className='card stock '+rc+gl;
   card.innerHTML='<div class="icon">'+em+'</div><div class="name">'+c.name+hr+mt+hb+' <span style="font-size:11px;color:#8b949e">'+c.code+'</span></div><div class="meta"><span class="badge">'+fmtRating(r)+' '+sc+'</span></div>';
   card.onclick=function(e){e.stopPropagation();openStockDetail(c)};
  }else{
   card.className='card '+c.type;
   var im={'theme':'📂','track':'📁','sub':'🏷'},cnt=(c.children||[]).length,has=cnt>0;
   card.innerHTML='<div class="icon">'+(im[c.type]||'📄')+'</div><div class="name">'+c.name+'</div><div class="meta">'+(has?'<span class="badge">'+cnt+'个</span>':'')+'</div><div class="arrow">'+(has?'→':'')+'</div>';
   if(has)card.onclick=function(){navStack.push({node:c,idx:navStack.length});render();document.getElementById('search').value=''};
  }
  g.appendChild(card);
 });
 ct.appendChild(g);
}
function getScore(sn){var m=getMeta(sn.name);return(m&&typeof m.score==='number')?m.score:(typeof sn.score==='number'?sn.score:-1)}

/* --- Init --- */
navStack=[{node:TREE,idx:-1}];
var us={};
Object.keys(stockIndex).forEach(function(k){var v=stockIndex[k];if(typeof v==='object'&&v.type==='stock'&&v.code)us[v.code]=v});
document.getElementById('stock-count').textContent=Object.keys(us).length;
document.getElementById('track-count').textContent=TREE.children.length+'赛道';
document.addEventListener('keydown',function(e){
 if(e.key==='Backspace'&&document.activeElement===document.body&&navStack.length>1){navStack.pop();render();e.preventDefault()}
 if(e.key==='Escape')closeModal();
});
render();
</script>
