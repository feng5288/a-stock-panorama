// ============ PASSWORD ============
async function sha256(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function checkPassword(){
  const h = await sha256(document.getElementById('pw-input').value);
  if(h === PASSWORD_HASH){
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('app').style.display = 'block';
    if(IS_SERVER) document.getElementById('server-badge').style.display = 'inline';
    render();
    loadConceptHeat();
  } else {
    const e = document.getElementById('pw-error');
    e.style.display = 'block';
    setTimeout(function(){ e.style.display = 'none'; }, 2000);
  }
}

// ============ CONCEPT HEAT DATA ============
function loadConceptHeat(){
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'concept_heat.json', true);
  xhr.onload = function(){
    if(xhr.status === 200){
      try { CONCEPT_HEAT = JSON.parse(xhr.responseText); } catch(e) { CONCEPT_HEAT = null; }
    }
  };
  xhr.onerror = function(){ CONCEPT_HEAT = null; };
  xhr.send();
}

function toggleHeatOnly(){
  HEAT_MODE = HEAT_MODE === 0 ? 1 : 0;
  var btn = document.getElementById('heat-toggle');
  if(HEAT_MODE === 1){
    btn.classList.add('active');
    btn.textContent = '馃敟 鐑偣 ON';
  } else {
    btn.classList.remove('active');
    btn.textContent = '馃敟 鐑偣';
  }
  render();
}

function getHeatInfo(stockCode){
  // Returns {pct, name} or null using CONCEPT_HEAT.stocks dict
  if(!CONCEPT_HEAT || !CONCEPT_HEAT.stocks) return null;
  var info = CONCEPT_HEAT.stocks[stockCode];
  if(!info) return null;
  var conceptName = (info.concepts && info.concepts.length > 0) ? info.concepts[0] : '鐑偣';
  return {pct: info.maxChg || 0, name: conceptName};
}

function heatBadgeHTML(heat){
  if(!heat) return '';
  return '<span class="heat-badge">馃敟 ' + heat.name + ' +' + heat.pct + '%</span>';
}

function heatGlowClass(heat){
  if(!heat) return '';
  if(heat.pct >= 5) return ' stock-hot-a';
  if(heat.pct >= 3) return ' stock-hot-b';
  return ' stock-hot-c';
}
var navStack = [{node: TREE, idx: -1}];
var stockIndex = {};      // code/name -> stock obj
var stockPaths = {};      // code -> [{theme, track, sub}] locations

function current(){ return navStack[navStack.length-1]; }

function buildGlobalIndex(node, theme, track, sub){
  if(!node.children) return;
  node.children.forEach(function(c){
    if(c.type === 'stock'){
      var id = c.id || c.code;
      stockIndex[id] = c;
      stockIndex[c.name] = c;
      stockIndex[c.code] = c;
      stockPaths.setdefault = function(k,v){ if(!this[k]) this[k]=[]; this[k].push(v); };
      if(!stockPaths[id]) stockPaths[id] = [];
      stockPaths[id].push({theme: theme, track: track, sub: sub, stock: c});
    } else {
      var nt = c.type === 'theme' ? c.name : theme;
      var nr = c.type === 'track' ? c.name : track;
      var ns = c.type === 'sub' ? c.name : sub;
      buildGlobalIndex(c, nt, nr, ns);
    }
  });
}
// Monkey-patch setdefault
if(!Object.prototype.hasOwnProperty.call(stockPaths, 'setdefault')){
  Object.defineProperty(Object.prototype, 'setdefault', {
    value: function(k,v){ if(!this[k]) this[k]=[]; this[k].push(v); return this[k]; },
    configurable: true, writable: true
  });
}
buildGlobalIndex(TREE, '', '', '');

function render(){
  var cur = current();
  var children = cur.node.children || [];
  var bcEl = document.getElementById('breadcrumb');
  var ctEl = document.getElementById('content');

  // Breadcrumb
  bcEl.innerHTML = '';
  if(navStack.length > 1){
    var back = document.createElement('span');
    back.className = 'back';
    back.textContent = '鈫?杩斿洖涓婄骇';
    back.onclick = function(){ navStack.pop(); render(); };
    bcEl.appendChild(back);
    var sp = document.createElement('span');
    sp.className = 'sep'; sp.textContent = '|';
    bcEl.appendChild(sp);
  }
  for(var i = 0; i < navStack.length; i++){
    var s = navStack[i];
    if(i > 0){
      var sep = document.createElement('span');
      sep.className = 'sep'; sep.textContent = '鈥?;
      bcEl.appendChild(sep);
    }
    var cr = document.createElement('span');
    cr.className = 'crumb' + (i === navStack.length-1 ? ' active' : '');
    cr.textContent = s.node.name;
    if(i < navStack.length-1){
      (function(idx){ cr.onclick = function(){ navStack = navStack.slice(0, idx+1); render(); }; })(i);
    }
    bcEl.appendChild(cr);
  }

  // Content
  ctEl.innerHTML = '';
  if(!children || children.length === 0){
    ctEl.innerHTML = '<div class="empty"><div class="eicon">馃摥</div><div class="etext">鏆傛棤瀛愬垎绫?/div></div>';
    return;
  }

  var nodeLevel = cur.node.type || 'root';
  var labelMap = {root:'澶ц禌閬?, theme:'瀛愭澘鍧?, track:'姒傚康缁嗗垎', sub:'鑲＄エ'};
  var nextMap = {root:'璧涢亾', theme:'瀛愭澘鍧?, track:'姒傚康'};
  var label = labelMap[nodeLevel] || '';
  var nextName = nextMap[nodeLevel] || '椤?;
  if(label){
    var t = document.createElement('div');
    t.className = 'level-title';
    t.textContent = label + ' 路 ' + children.length + ' 涓? + nextName;
    ctEl.appendChild(t);
  }

  var grid = document.createElement('div');
  grid.className = 'card-grid';

  // Sort: folders first, then stocks by score desc
  var sorted = children.slice().sort(function(a,b){
    var aDir = a.type !== 'stock';
    var bDir = b.type !== 'stock';
    if(aDir !== bDir) return aDir ? -1 : 1;
    if(a.type === 'stock'){
      var as = a.score === null ? -1 : (a.score || 0);
      var bs = b.score === null ? -1 : (b.score || 0);
      return bs - as;
    }
    return 0;
  });

  sorted.forEach(function(child){
    var card = document.createElement('div');
    var isStock = child.type === 'stock';

    if(isStock){
      var r = child.rating || '?';
      var rc = 'stock-q';
      if(r.charAt(0) === 'A') rc = 'stock-a';
      else if(r.charAt(0) === 'B') rc = 'stock-b';
      else if(r.charAt(0) === 'C') rc = 'stock-c';
      else if(r.charAt(0) === 'D') rc = 'stock-d';

      var emoji = {'A':'馃煝','B':'馃數','C':'馃煛','D':'馃敶'}[r.charAt(0)] || '鈿?;
      var scoreStr = child.score !== null ? child.score + '/30' : '?';
      var hasRpt = child.hasReport ? ' 馃搫' : '';
      var multiTag = '';
      var stockId = child.id || child.code;
      if(stockPaths[stockId] && stockPaths[stockId].length > 1){
        multiTag = '<span class="multi-tag">脳' + stockPaths[stockId].length + '</span>';
      }
      var heat = HEAT_MODE === 1 ? getHeatInfo(child.code) : null;
      var hbHtml = HEAT_MODE === 1 ? heatBadgeHTML(heat) : '';
      var glowCls = HEAT_MODE === 1 ? heatGlowClass(heat) : '';
      card.className = 'card stock ' + rc + glowCls;
      card.innerHTML = '<div class="icon">' + emoji + '</div><div class="name">' + child.name + hasRpt + multiTag + hbHtml + ' <span style="font-size:11px;color:#8b949e">' + child.code + '</span></div><div class="meta"><span class="badge">' + r + '绾?' + scoreStr + '</span></div>';
      card.onclick = function(e){ e.stopPropagation(); openStockDetail(child); };
    } else {
      card.className = 'card ' + child.type;
      var iconMap = {theme:'馃搨', track:'馃搧', sub:'馃彿锔?};
      var hasCh = (child.children || []).length > 0;
      card.innerHTML = '<div class="icon">' + (iconMap[child.type] || '馃搫') + '</div><div class="name">' + child.name + '</div><div class="meta">' + (hasCh ? '<span class="badge">' + (child.children||[]).length + '涓?/span>' : '') + '</div><div class="arrow">' + (hasCh ? '鈫? : '') + '</div>';
      if(hasCh){
        card.onclick = function(){ navStack.push({node: child, idx: navStack.length}); render(); document.getElementById('search').value = ''; };
      }
    }
    grid.appendChild(card);
  });
  ctEl.appendChild(grid);
}

// ============ STOCK DETAIL MODAL ============

  // Show all locations if stock appears in multiple places
  var locHtml = '';

  if(paths.length > 1){
    locHtml = '<div class="m-locations">馃搷 鍚屾椂褰掑睘浠ヤ笅姒傚康锛?;
    paths.forEach(function(p){
      locHtml += '<br>銆€<a class="loc-link" onclick="navigateToStock(\'' + stockId + '\',\'' + p.sub + '\')">' + p.theme + ' 鈫?' + p.track + ' 鈫?' + p.sub + '</a>';
    });
    locHtml += '</div>';
  }

  // Old template note
  var noteHtml = '';
  if(r === '?'){
    noteHtml = '<div class="m-note-old">鈿狅笍 姝ゆ姤鍛婄敓鎴愪簬鏃╂湡妯℃澘锛屾湭鍖呭惈姝ｅ紡璇勭骇锛屽彲閲嶆柊鍒嗘瀽琛ュ厖</div>';
  }

  m.innerHTML = '<div class="modal" onclick="event.stopPropagation()"><button class="m-close" onclick="closeModal()">脳</button><h3 style="color:' + c + '">' + stock.name + '</h3><div class="m-code">' + stock.code + '</div><div class="m-row"><span class="m-label">璇勭骇</span><span class="m-value" style="color:' + c + '">' + r + '绾?/span></div><div class="m-row"><span class="m-label">缁煎悎璇勫垎</span><span class="m-value">' + scoreStr + '</span></div><div class="m-summary">馃摑 ' + summary + '</div>' + locHtml + noteHtml + dlHtml + '</div>';
  m.style.opacity = '1';

  setTimeout(function(){
    var iframe = document.getElementById('report-iframe');

function closeModal(){

// Close modal on overlay click

document.getElementById('modal-overlay').addEventListener('click', closeModal);

// ============ SEARCH: navigate to stock location ============
function onSearchKey(e){
  if(e.key === 'Enter'){
    var q = document.getElementById('search').value.trim();
    if(!q) return;
    // Try exact match first
    var stock = stockIndex[q];
    if(stock && typeof stock === 'object'){
      navigateToStock(stock.id || stock.code, null);
      document.getElementById('search').value = '';
      return;
    }
    // Fuzzy match: only iterate own keys, skip functions/prototype
    var ql = q.toLowerCase();
    var ownKeys = Object.keys(stockIndex);
    for(var i = 0; i < ownKeys.length; i++){
      var k = ownKeys[i];
      var v = stockIndex[k];
      if(typeof v !== 'object' || !v.code) continue;
      if(k.toLowerCase().indexOf(ql) === 0 || k.indexOf(q) >= 0){
        navigateToStock(v.id || v.code, null);
        document.getElementById('search').value = '';
        return;
      }
    }
    filterCards(q);
  }
}

function onSearchInput(val){
  // Real-time filtering while typing, but only for non-stock matches
  if(!val || val.length < 2){ render(); return; }
  var stock = stockIndex[val];
  if(!stock || typeof stock !== 'object'){
    var ql = val.toLowerCase();
    var ownKeys = Object.keys(stockIndex);
    for(var i = 0; i < ownKeys.length; i++){
      var k = ownKeys[i];
      var v = stockIndex[k];
      if(typeof v !== 'object' || !v.code) continue;
      if(k.toLowerCase().indexOf(ql) === 0 || k.indexOf(val) >= 0){
        stock = v; break;
      }
    }
  }
  if(stock && typeof stock === 'object'){
    // Show stock card inline with "navigate" option
    showSearchPreview(stock, val);
  } else {
    filterCards(val);
  }
}

function showSearchPreview(stock, q){
  var ctEl = document.getElementById('content');
  ctEl.innerHTML = '<div class="level-title">鎼滅储缁撴灉 路 鑲＄エ鍖归厤</div>';
  var grid = document.createElement('div');
  grid.className = 'card-grid';

  var r = stock.rating || '?';
  var rc = {'A':'stock-a','B':'stock-b','C':'stock-c','D':'stock-d'}[r.charAt(0)] || 'stock-q';
  var emoji = {'A':'馃煝','B':'馃數','C':'馃煛','D':'馃敶'}[r.charAt(0)] || '鈿?;
  var scoreStr = stock.score !== null ? stock.score + '/30' : '?';
  var stockId = stock.id || stock.code;
  var paths = stockPaths[stockId] || [];

  var heat = HEAT_MODE === 1 ? getHeatInfo(stock.code) : null;
  var hbHtml = HEAT_MODE === 1 ? heatBadgeHTML(heat) : '';
  var glowCls = HEAT_MODE === 1 ? heatGlowClass(heat) : '';

  paths.forEach(function(p, i){
    var card = document.createElement('div');
    card.className = 'card stock ' + rc + glowCls;
    var hasRpt = stock.hasReport ? ' 馃搫' : '';
    var locLabel = i === 0 ? '' : ' (浣嶇疆' + (i+1) + ')';
    card.innerHTML = '<div class="icon">' + emoji + '</div><div class="name">' + stock.name + hasRpt + locLabel + hbHtml + ' <span style="font-size:11px;color:#8b949e">' + stock.code + '</span></div><div class="meta"><span class="badge">' + r + '绾?' + scoreStr + '</span><span style="font-size:10px;color:#58a6ff">馃搷 ' + p.theme + ' 鈫?' + p.track + ' 鈫?' + p.sub + '</span></div><div class="arrow">鈫?/div>';
    card.onclick = function(e){
      e.stopPropagation();
      navigateToStock(stockId, p.sub);
      document.getElementById('search').value = '';
    };
    grid.appendChild(card);
  });
  ctEl.appendChild(grid);
}

function navigateToStock(stockId, preferredSub){
  if(!stockId) return;
  var paths = stockPaths[stockId] || [];
  if(paths.length === 0) return;

  // Pick best path: preferredSub match, or first
  var targetPath = paths[0];
  if(preferredSub){
    for(var i = 0; i < paths.length; i++){
      if(paths[i].sub === preferredSub){ targetPath = paths[i]; break; }
    }
  }

  // Rebuild nav stack to target location
  navStack = [{node: TREE, idx: -1}];
  if(!TREE.children || !Array.isArray(TREE.children)) return;
  var themeNode = TREE.children.find(function(c){ return c && c.name === targetPath.theme; });
  if(!themeNode) return;
  navStack.push({node: themeNode, idx: 1});
  if(!themeNode.children) return;
  var trackNode = themeNode.children.find(function(c){ return c && c.name === targetPath.track; });
  if(!trackNode) return;
  navStack.push({node: trackNode, idx: 2});
  if(!trackNode.children) return;
  var subNode = trackNode.children.find(function(c){ return c && c.name === targetPath.sub; });
  if(!subNode) return;
  navStack.push({node: subNode, idx: 3});
  render();
}

function filterCards(q){
  if(!q){ render(); return; }
  var ql = q.toLowerCase();
  var cur = current();
  var children = cur.node.children || [];

  var ctEl = document.getElementById('content');
  var filtered = children.filter(function(c){
    if(c.name.toLowerCase().indexOf(ql) >= 0) return true;
    if(c.children && c.children.some(function(s){ return s.name.toLowerCase().indexOf(ql) >= 0 || (s.code||'').indexOf(ql) >= 0; })) return true;
    return false;
  });

  ctEl.innerHTML = '';
  if(filtered.length === 0){
    ctEl.innerHTML = '<div class="empty"><div class="eicon">馃攳</div><div class="etext">鏈壘鍒板尮閰?"' + q + '" 鐨勫唴瀹?/div></div>';
    return;
  }
  ctEl.innerHTML = '<div class="level-title">鎼滅储缁撴灉锛? + filtered.length + ' 椤瑰尮閰?/div>';
  var grid = document.createElement('div');
  grid.className = 'card-grid';
  filtered.forEach(function(child){
    var card = document.createElement('div');
    var isStock = child.type === 'stock';
    if(isStock){
      var r = child.rating || '?';
      var rc = {'A':'stock-a','B':'stock-b','C':'stock-c','D':'stock-d'}[r.charAt(0)] || 'stock-q';
      var emoji = {'A':'馃煝','B':'馃數','C':'馃煛','D':'馃敶'}[r.charAt(0)] || '鈿?;
      var scoreStr = child.score !== null ? child.score + '/30' : '?';
      var heat2 = HEAT_MODE === 1 ? getHeatInfo(child.code) : null;
      var hb2 = HEAT_MODE === 1 ? heatBadgeHTML(heat2) : '';
      var glow2 = HEAT_MODE === 1 ? heatGlowClass(heat2) : '';
      card.className = 'card stock ' + rc + glow2;
      card.innerHTML = '<div class="icon">' + emoji + '</div><div class="name">' + highlight(child.name, q) + hb2 + ' <span style="font-size:11px;color:#8b949e">' + child.code + '</span></div><div class="meta"><span class="badge">' + r + '绾?' + scoreStr + '</span></div>';
      card.onclick = function(e){ e.stopPropagation(); navigateToStock(child.id || child.code, null); };
    } else {
      card.className = 'card ' + child.type;
      var iconMap = {theme:'馃搨', track:'馃搧', sub:'馃彿锔?};
      var h = (child.children || []).length > 0;
      card.innerHTML = '<div class="icon">' + (iconMap[child.type] || '馃搫') + '</div><div class="name">' + highlight(child.name, q) + '</div><div class="meta">' + (h ? '<span class="badge">' + h + '涓?/span>' : '') + '</div><div class="arrow">' + (h ? '鈫? : '') + '</div>';
      if(h){
        card.onclick = function(){ navStack.push({node: child, idx: navStack.length}); render(); document.getElementById('search').value = ''; };
      }
    }
    grid.appendChild(card);
  });
  ctEl.appendChild(grid);
}

function highlight(text, q){
  var idx = text.toLowerCase().indexOf(q.toLowerCase());
  if(idx < 0) return text;
  return text.substring(0, idx) + '<span style="color:#e3b341;font-weight:700">' + text.substring(idx, idx+q.length) + '</span>' + text.substring(idx+q.length);
}

// ============ GLOBAL KEYBOARD ============
document.addEventListener('keydown', function(e){
  if(e.key === 'Backspace' && document.activeElement === document.body && navStack.length > 1){
    navStack.pop(); render(); e.preventDefault();
  }
  if(e.key === 'Escape'){ closeModal(); }
});
