<style>

*{margin:0;padding:0;box-sizing:border-box}

body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}

#app{display:none;max-width:1400px;margin:0 auto;padding:0 20px 40px}

#topbar{position:sticky;top:0;z-index:100;background:#0d1117;padding:14px 0 10px;border-bottom:1px solid #21262d;margin-bottom:16px}

#topbar .inner{display:flex;align-items:center;gap:12px;flex-wrap:wrap}

#topbar h1{font-size:18px;color:#58a6ff;white-space:nowrap}

#topbar .search{flex:1;min-width:180px}

#topbar .search input{width:100%;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:8px 14px;color:#c9d1d9;font-size:13px;outline:none;transition:border-color .2s}

#topbar .search input:focus{border-color:#58a6ff}

#topbar .search input::placeholder{color:#484f58}

#topbar .info{font-size:11px;color:#8b949e}

#topbar .info .srv{color:#3fb950;margin-left:6px}

#breadcrumb{display:flex;align-items:center;gap:6px;padding:0 0 14px;flex-wrap:wrap}

#breadcrumb .crumb{font-size:12px;padding:4px 12px;border-radius:6px;cursor:pointer;background:#21262d;color:#8b949e;border:1px solid transparent;transition:all .15s}

#breadcrumb .crumb:hover{background:#30363d;color:#c9d1d9;border-color:#484f58}

#breadcrumb .crumb.active{background:#1f6feb22;color:#58a6ff;border-color:#1f6feb44;cursor:default}

#breadcrumb .sep{color:#30363d;font-size:14px}

#breadcrumb .back{font-size:15px;padding:7px 16px;border-radius:8px;cursor:pointer;background:#da363322;color:#f85149;border:1px solid #da363344;transition:all .15s;font-weight:700}

#breadcrumb .back:hover{background:#da363344;transform:scale(1.05)}

#content{margin-top:8px}

.level-title{font-size:13px;color:#8b949e;margin-bottom:14px}

.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}

.card{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:16px 18px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:8px;position:relative;overflow:hidden}

.card:hover{border-color:#30363d;transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.3)}

.card:active{transform:translateY(0)}

.card .icon{font-size:22px}

.card .name{font-size:15px;font-weight:600;color:#c9d1d9;line-height:1.3}

.card .meta{font-size:11px;color:#484f58;display:flex;gap:6px;align-items:center;flex-wrap:wrap}

.card .meta .badge{background:#21262d;padding:2px 8px;border-radius:8px}

.card .multi-tag{font-size:10px;background:#d2a8ff22;color:#d2a8ff;padding:1px 6px;border-radius:6px;margin-left:4px}

.card .arrow{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:18px;color:#30363d;transition:all .2s}

.card:hover .arrow{color:#58a6ff;right:10px}

.card.theme{border-left:3px solid #d2a8ff}

.card.track{border-left:3px solid #8b949e}

.card.sub{border-left:3px solid #484f58}

.card.stock{border-left:3px solid #1f6feb}

.card.stock-a{border-left:4px solid #238636;background:#23863608}

.card.stock-b{border-left:4px solid #1f6feb;background:#1f6feb08}

.card.stock-c{border-left:4px solid #d29922;background:#d2992208}

.card.stock-d{border-left:4px solid #da3633;background:#da363308}

.card.stock-q{border-left:4px solid #6e7681;background:#6e768108}

.empty{text-align:center;padding:60px 20px;color:#484f58}

.empty .eicon{font-size:48px;margin-bottom:12px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}

.modal-overlay.show{opacity:1;pointer-events:auto}

.modal{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;max-width:560px;width:94%;max-height:85vh;overflow-y:auto}

.modal h3{font-size:18px;margin-bottom:4px}

.modal .m-code{font-size:12px;color:#8b949e;margin-bottom:14px}

.modal .m-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #21262d;font-size:13px}

.modal .m-label{color:#8b949e}

.modal .m-value{color:#c9d1d9;font-weight:500}

.modal .m-close{float:right;background:none;border:none;color:#8b949e;font-size:20px;cursor:pointer;padding:4px 8px}

.modal .m-close:hover{color:#c9d1d9}

.modal .m-summary{margin-top:12px;font-size:13px;color:#8b949e;line-height:1.6;padding:10px;background:#0d1117;border-radius:8px;border:1px solid #21262d}

.modal .m-path-box{margin-top:14px;padding:12px;background:#0d1117;border:1px solid #30363d;border-radius:8px;font-size:12px}

.modal .m-path-box .ptitle{color:#8b949e;margin-bottom:6px;font-weight:600}

.modal .m-path-box .ppath{color:#58a6ff;font-family:'Cascadia Code','Consolas',monospace;font-size:11px;word-break:break-all;line-height:1.5;background:#161b22;padding:8px 10px;border-radius:4px;margin:4px 0}

.modal .m-path-box .dl-btn{display:inline-block;margin-top:6px;padding:8px 20px;background:#238636;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;text-decoration:none;font-weight:600;transition:all .15s}

.modal .m-path-box .dl-btn:hover{background:#2ea043;transform:scale(1.03)}

.modal .m-path-box .clip-btn{display:inline-block;margin-top:6px;padding:6px 14px;background:#1f6feb22;color:#58a6ff;border:1px solid #1f6feb44;border-radius:6px;font-size:12px;cursor:pointer;transition:all .15s;margin-left:8px}

.modal .m-path-box .clip-btn:hover{background:#1f6feb44}

.modal .m-path-box .clip-btn.copied{background:#238636;border-color:#238636;color:#fff}

.modal .m-note-old{font-size:12px;color:#d29922;margin-top:8px;padding:8px 12px;background:#d2992211;border:1px solid #d2992233;border-radius:6px}

.modal .m-locations{margin-top:12px;font-size:12px;color:#8b949e;line-height:1.8}

.modal .m-locations .loc-link{color:#58a6ff;cursor:pointer;text-decoration:underline}

.modal .m-locations .loc-link:hover{color:#79c0ff}

#footer{text-align:center;padding:30px 0 20px;font-size:10px;color:#21262d;border-top:1px solid #161b22;margin-top:20px}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.card{animation:fadeIn .25s ease-out}

@media(max-width:768px){.card-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}.card{padding:12px 14px}.card .name{font-size:13px}}


#password-gate{position:fixed;inset:0;background:#0d1117;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px}
#password-gate .gate-box{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:40px 32px;text-align:center;max-width:360px;width:90%}
#password-gate h2{color:#58a6ff;font-size:22px;margin-bottom:8px}
#password-gate p{color:#8b949e;font-size:13px;margin-bottom:20px}
#password-gate input{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:10px 14px;color:#c9d1d9;font-size:15px;text-align:center;outline:none;transition:border-color .2s}
#password-gate input:focus{border-color:#58a6ff}
#password-gate button{width:100%;margin-top:12px;padding:10px;background:#238636;border:none;border-radius:8px;color:#fff;font-size:15px;cursor:pointer;transition:background .2s}
#password-gate button:hover{background:#2ea043}
#password-gate .err{color:#f85149;font-size:12px;margin-top:8px;display:none}

</style>

var navStack = [{node: TREE, idx: -1}];

var stockIndex = {};      // code/name -> stock obj

var stockPaths = {};      // code -> [{theme, track, sub}] locations



function current(){ return navStack[navStack.length-1]; }



function buildGlobalIndex(node, theme, track, sub){

  if(!node.children) return;

  node.children.forEach(function(c){

    if(c.type === 'stock'){

      var id = c.id || c.code;

      stockIndex[id] = c;

      stockIndex[c.name] = c;

      stockIndex[c.code] = c;

      stockPaths.setdefault = function(k,v){ if(!this[k]) this[k]=[]; this[k].push(v); };

      if(!stockPaths[id]) stockPaths[id] = [];

      stockPaths[id].push({theme: theme, track: track, sub: sub, stock: c});

    } else {

      var nt = c.type === 'theme' ? c.name : theme;

      var nr = c.type === 'track' ? c.name : track;

      var ns = c.type === 'sub' ? c.name : sub;

      buildGlobalIndex(c, nt, nr, ns);

    }

  });

}

// Monkey-patch setdefault

if(!Object.prototype.hasOwnProperty.call(stockPaths, 'setdefault')){

  Object.defineProperty(Object.prototype, 'setdefault', {

    value: function(k,v){ if(!this[k]) this[k]=[]; this[k].push(v); return this[k]; },

    configurable: true, writable: true

  });

}

buildGlobalIndex(TREE, '', '', '');



function render(){

  var cur = current();

  var children = cur.node.children || [];

  var bcEl = document.getElementById('breadcrumb');

  var ctEl = document.getElementById('content');



  // Breadcrumb

  bcEl.innerHTML = '';

  if(navStack.length > 1){

    var back = document.createElement('span');

    back.className = 'back';

    back.textContent = '← 返回上级';

    back.onclick = function(){ navStack.pop(); render(); };

    bcEl.appendChild(back);

    var sp = document.createElement('span');

    sp.className = 'sep'; sp.textContent = '|';

    bcEl.appendChild(sp);

  }

  for(var i = 0; i < navStack.length; i++){

    var s = navStack[i];

    if(i > 0){

      var sep = document.createElement('span');

      sep.className = 'sep'; sep.textContent = '›';

      bcEl.appendChild(sep);

    }

    var cr = document.createElement('span');

    cr.className = 'crumb' + (i === navStack.length-1 ? ' active' : '');

    cr.textContent = s.node.name;

    if(i < navStack.length-1){

      (function(idx){ cr.onclick = function(){ navStack = navStack.slice(0, idx+1); render(); }; })(i);

    }

    bcEl.appendChild(cr);

  }



  // Content

  ctEl.innerHTML = '';

  if(!children || children.length === 0){

    ctEl.innerHTML = '<div class="empty"><div class="eicon">📭</div><div class="etext">暂无子分类</div></div>';

    return;

  }



  var nodeLevel = cur.node.type || 'root';

  var labelMap = {root:'大赛道', theme:'子板块', track:'概念细分', sub:'股票'};

  var nextMap = {root:'赛道', theme:'子板块', track:'概念'};

  var label = labelMap[nodeLevel] || '';

  var nextName = nextMap[nodeLevel] || '项';

  if(label){

    var t = document.createElement('div');

    t.className = 'level-title';

    t.textContent = label + ' · ' + children.length + ' 个' + nextName;

    ctEl.appendChild(t);

  }



  var grid = document.createElement('div');

  grid.className = 'card-grid';



  // Sort: folders first, then stocks by score desc

  var sorted = children.slice().sort(function(a,b){

    var aDir = a.type !== 'stock';

    var bDir = b.type !== 'stock';

    if(aDir !== bDir) return aDir ? -1 : 1;

    if(a.type === 'stock'){

      var as = a.score === null ? -1 : (a.score || 0);

      var bs = b.score === null ? -1 : (b.score || 0);

      return bs - as;

    }

    return 0;

  });



  sorted.forEach(function(child){

    var card = document.createElement('div');

    var isStock = child.type === 'stock';



    if(isStock){

      var r = child.grade || '?';

      var rc = 'stock-q';

      if(r.charAt(0) === 'A') rc = 'stock-a';

      else if(r.charAt(0) === 'B') rc = 'stock-b';

      else if(r.charAt(0) === 'C') rc = 'stock-c';

      else if(r.charAt(0) === 'D') rc = 'stock-d';



      var emoji = {'A':'🟢','B':'🔵','C':'🟡','D':'🔴'}[r.charAt(0)] || '⚪';

      var scoreStr = child.score !== null ? child.score + '/30' : '?';

      var hasRpt = child.hasReport ? ' 📄' : '';

      var multiTag = '';

      var stockId = child.id || child.code;

      if(stockPaths[stockId] && stockPaths[stockId].length > 1){

        multiTag = '<span class="multi-tag">×' + stockPaths[stockId].length + '</span>';

      }

      card.className = 'card stock ' + rc;

      card.innerHTML = '<div class="icon">' + emoji + '</div><div class="name">' + child.name + hasRpt + multiTag + ' <span style="font-size:11px;color:#8b949e">' + child.code + '</span></div><div class="meta"><span class="badge">' + r + '级 ' + scoreStr + '</span></div>';

      card.onclick = function(e){ e.stopPropagation(); openStockDetail(child); };

    } else {

      card.className = 'card ' + child.type;

      var iconMap = {theme:'📂', track:'📁', sub:'🏷️'};

      var hasCh = (child.children || []).length > 0;

      card.innerHTML = '<div class="icon">' + (iconMap[child.type] || '📄') + '</div><div class="name">' + child.name + '</div><div class="meta">' + (hasCh ? '<span class="badge">' + (child.children||[]).length + '个</span>' : '') + '</div><div class="arrow">' + (hasCh ? '→' : '') + '</div>';

      if(hasCh){

        card.onclick = function(){ navStack.push({node: child, idx: navStack.length}); render(); document.getElementById('search').value = ''; };

      }

    }

    grid.appendChild(card);

  });

  ctEl.appendChild(grid);

}

function onSearchKey(e){

  if(e.key === 'Enter'){

    var q = document.getElementById('search').value.trim();

    if(!q) return;

    // Try exact match first

    var stock = stockIndex[q];

    if(stock){

      navigateToStock(stock.id || stock.code, null);

      document.getElementById('search').value = '';

      return;

    }

    // Fuzzy match

    var ql = q.toLowerCase();

    for(var k in stockIndex){

      if(k.toLowerCase().indexOf(ql) === 0 || k.indexOf(q) >= 0){

        navigateToStock(stockIndex[k].id || stockIndex[k].code, null);

        document.getElementById('search').value = '';

        return;

      }

    }

    filterCards(q);

  }

}



function onSearchInput(val){

  // Real-time filtering while typing, but only for non-stock matches

  if(!val || val.length < 2){ render(); return; }

  var stock = stockIndex[val];

  if(!stock){

    var ql = val.toLowerCase();

    for(var k in stockIndex){

      if(k.toLowerCase().indexOf(ql) === 0 || k.indexOf(val) >= 0){

        stock = stockIndex[k]; break;

      }

    }

  }

  if(stock){

    // Show stock card inline with "navigate" option

    showSearchPreview(stock, val);

  } else {

    filterCards(val);

  }

}



function showSearchPreview(stock, q){

  var ctEl = document.getElementById('content');

  ctEl.innerHTML = '<div class="level-title">搜索结果 · 股票匹配</div>';

  var grid = document.createElement('div');

  grid.className = 'card-grid';



  var r = stock.grade || '?';

  var rc = {'A':'stock-a','B':'stock-b','C':'stock-c','D':'stock-d'}[r.charAt(0)] || 'stock-q';

  var emoji = {'A':'🟢','B':'🔵','C':'🟡','D':'🔴'}[r.charAt(0)] || '⚪';

  var scoreStr = stock.score !== null ? stock.score + '/30' : '?';

  var stockId = stock.id || stock.code;

  var paths = stockPaths[stockId] || [];



  paths.forEach(function(p, i){

    var card = document.createElement('div');

    card.className = 'card stock ' + rc;

    var hasRpt = stock.hasReport ? ' 📄' : '';

    var locLabel = i === 0 ? '' : ' (位置' + (i+1) + ')';

    card.innerHTML = '<div class="icon">' + emoji + '</div><div class="name">' + stock.name + hasRpt + locLabel + ' <span style="font-size:11px;color:#8b949e">' + stock.code + '</span></div><div class="meta"><span class="badge">' + r + '级 ' + scoreStr + '</span><span style="font-size:10px;color:#58a6ff">📍 ' + p.theme + ' → ' + p.track + ' → ' + p.sub + '</span></div><div class="arrow">→</div>';

    card.onclick = function(e){

      e.stopPropagation();

      navigateToStock(stockId, p.sub);

      document.getElementById('search').value = '';

    };

    grid.appendChild(card);

  });

  ctEl.appendChild(grid);

}



function navigateToStock(stockId, preferredSub){

  var paths = stockPaths[stockId] || [];

  if(paths.length === 0) return;



  // Pick best path: preferredSub match, or first

  var targetPath = paths[0];

  if(preferredSub){

    for(var i = 0; i < paths.length; i++){

      if(paths[i].sub === preferredSub){ targetPath = paths[i]; break; }

    }

  }



  // Rebuild nav stack to target location

  navStack = [{node: TREE, idx: -1}];

  var themeNode = TREE.children.find(function(c){ return c.name === targetPath.theme; });

  if(!themeNode) return;

  navStack.push({node: themeNode, idx: 1});

  var trackNode = themeNode.children.find(function(c){ return c.name === targetPath.track; });

  if(!trackNode) return;

  navStack.push({node: trackNode, idx: 2});

  var subNode = trackNode.children.find(function(c){ return c.name === targetPath.sub; });

  if(!subNode) return;

  navStack.push({node: subNode, idx: 3});

  render();

}



function filterCards(q){

  if(!q){ render(); return; }

  var ql = q.toLowerCase();

  var cur = current();

  var children = cur.node.children || [];



  var ctEl = document.getElementById('content');

  var filtered = children.filter(function(c){

    if(c.name.toLowerCase().indexOf(ql) >= 0) return true;

    if(c.children && c.children.some(function(s){ return s.name.toLowerCase().indexOf(ql) >= 0 || (s.code||'').indexOf(ql) >= 0; })) return true;

    return false;

  });



  ctEl.innerHTML = '';

  if(filtered.length === 0){

    ctEl.innerHTML = '<div class="empty"><div class="eicon">🔍</div><div class="etext">未找到匹配 "' + q + '" 的内容</div></div>';

    return;

  }

  ctEl.innerHTML = '<div class="level-title">搜索结果：' + filtered.length + ' 项匹配</div>';

  var grid = document.createElement('div');

  grid.className = 'card-grid';

  filtered.forEach(function(child){

    var card = document.createElement('div');

    var isStock = child.type === 'stock';

    if(isStock){

      var r = child.grade || '?';

      var rc = {'A':'stock-a','B':'stock-b','C':'stock-c','D':'stock-d'}[r.charAt(0)] || 'stock-q';

      var emoji = {'A':'🟢','B':'🔵','C':'🟡','D':'🔴'}[r.charAt(0)] || '⚪';

      var scoreStr = child.score !== null ? child.score + '/30' : '?';

      card.className = 'card stock ' + rc;

      card.innerHTML = '<div class="icon">' + emoji + '</div><div class="name">' + highlight(child.name, q) + ' <span style="font-size:11px;color:#8b949e">' + child.code + '</span></div><div class="meta"><span class="badge">' + r + '级 ' + scoreStr + '</span></div>';

      card.onclick = function(e){ e.stopPropagation(); navigateToStock(child.id || child.code, null); };

    } else {

      card.className = 'card ' + child.type;

      var iconMap = {theme:'📂', track:'📁', sub:'🏷️'};

      var h = (child.children || []).length > 0;

      card.innerHTML = '<div class="icon">' + (iconMap[child.type] || '📄') + '</div><div class="name">' + highlight(child.name, q) + '</div><div class="meta">' + (h ? '<span class="badge">' + h + '个</span>' : '') + '</div><div class="arrow">' + (h ? '→' : '') + '</div>';

      if(h){

        card.onclick = function(){ navStack.push({node: child, idx: navStack.length}); render(); document.getElementById('search').value = ''; };

      }

    }

    grid.appendChild(card);

  });

  ctEl.appendChild(grid);

}



function highlight(text, q){

  var idx = text.toLowerCase().indexOf(q.toLowerCase());

  if(idx < 0) return text;
