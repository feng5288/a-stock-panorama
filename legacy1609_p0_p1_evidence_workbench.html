<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>P0/P1 分类证据补齐工作台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;background:#f6f7f9;color:#18202a}a{color:inherit;text-decoration:none}.top{position:sticky;top:0;z-index:9;background:#fff;border-bottom:1px solid #dde2ea}.top-inner{max-width:1400px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}h1{font-size:22px}.sub{font-size:12px;color:#667180;margin-top:4px}.nav{display:flex;gap:8px;flex-wrap:wrap}.btn{border:1px solid #cfd7e3;background:#fff;border-radius:8px;padding:8px 11px;font-size:12px;cursor:pointer}.btn.primary{background:#18324f;color:#fff;border-color:#18324f}.wrap{max-width:1400px;margin:0 auto;padding:18px}.hero{display:grid;grid-template-columns:1.4fr .8fr;gap:14px;margin-bottom:14px}.panel{background:#fff;border:1px solid #dde2ea;border-radius:8px;padding:16px}.note{font-size:14px;line-height:1.75;color:#344153}.metrics{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.metric{background:#f1f4f8;border:1px solid #dde2ea;border-radius:8px;padding:12px}.metric b{display:block;font-size:26px}.metric span{font-size:12px;color:#667180}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.toolbar input{flex:1;min-width:260px;border:1px solid #cfd7e3;border-radius:8px;padding:9px 12px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(430px,1fr));gap:12px}.card{background:#fff;border:1px solid #dde2ea;border-left:5px solid #8793a3;border-radius:8px;padding:14px}.card.P0{border-left-color:#c0392b}.card.P1{border-left-color:#b77800}.head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:8px}.name{font-weight:850;font-size:17px}.code{font-size:12px;color:#667180;margin-left:6px}.tag{display:inline-flex;border-radius:999px;padding:3px 8px;font-size:12px;background:#eef2f7;color:#39475a;margin:0 5px 5px 0}.tag.P0{background:#ffe8e5;color:#9f2f24}.tag.P1{background:#fff2cf;color:#875900}.path{display:grid;grid-template-columns:1fr;gap:6px;margin:10px 0}.path div{font-size:13px;line-height:1.55;background:#f6f7f9;border:1px solid #e3e8f0;border-radius:7px;padding:8px}.label{font-size:12px;color:#667180;margin-bottom:3px}.section{margin-top:10px}.section-title{font-size:12px;color:#667180;margin-bottom:4px}.text{font-size:13px;line-height:1.65;color:#344153}.todo{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:10px}.todo div{border:1px dashed #c8d1df;border-radius:7px;padding:8px;font-size:13px;color:#344153}.empty{text-align:center;color:#667180;padding:26px}.warn{color:#9f2f24;font-weight:800}@media(max-width:900px){.hero{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.todo{grid-template-columns:1fr}}
</style></head><body>
<header class="top"><div class="top-inner"><div><h1>P0/P1 分类证据补齐工作台</h1><div class="sub" id="sub">旧报告接入后的优先纠偏清单</div></div><div class="nav"><a class="btn" href="index_v2_delivery.html?v=workbench1">公开首页</a><a class="btn" href="legacy1609_classification_audit.html?v=workbench1">分类体检</a></div></div></header>
<main class="wrap"><section class="hero"><div class="panel"><div class="note"><b>用途：</b>这页只处理 P0/P1 队列，不把它当成最终报告展示。P0/P1 的含义是“旧报告路径与新分类冲突、需要优先补证据卡”，不是说当前新分类一定错误。后续批量扩展时，先补这里的主营证据、财报证据、公告/官网证据，再放大到更多公司。</div></div><div class="panel"><div class="metrics" id="metrics"></div></div></section><section class="panel"><div class="toolbar"><button class="btn primary" data-f="all">全部</button><button class="btn" data-f="P0">P0</button><button class="btn" data-f="P1">P1</button><input id="q" placeholder="搜索公司 / 代码 / 新分类 / 旧路径"></div><div id="cards"></div></section></main>
<script src="legacy1609_classification_audit_v1.js"></script>
<script>
const DATA=LEGACY1609_CLASSIFICATION_AUDIT_V1;let filter='all';let q='';const $=id=>document.getElementById(id);
function esc(v){return String(v==null||v===''?'无':v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function list(){const term=q.trim().toLowerCase();return DATA.rows.filter(r=>r.priority==='P0'||r.priority==='P1').filter(r=>filter==='all'||r.priority===filter).filter(r=>!term||[r.code,r.name,r.old_path,r.new_path,r.new_node_name,(r.reasons||[]).join(' ')].join(' ').toLowerCase().includes(term))}
function renderMetrics(){const rows=DATA.rows.filter(r=>r.priority==='P0'||r.priority==='P1');const p0=rows.filter(r=>r.priority==='P0').length;const p1=rows.filter(r=>r.priority==='P1').length;const conflict=rows.filter(r=>(r.issue_types||[]).includes('old_new_conflict')).length;$('metrics').innerHTML=[['P0',p0],['P1',p1],['旧新冲突',conflict]].map(x=>`<div class="metric"><b>${x[1]}</b><span>${x[0]}</span></div>`).join('');$('sub').textContent=`生成时间 ${DATA.generated_at} · 当前优先队列 ${rows.length} 家`}
function card(r,i){const reasons=(r.reasons||[]).map(esc).join('；');return `<article class="card ${r.priority}"><div class="head"><div><span class="name">#${i+1} ${esc(r.name)}<span class="code">${esc(r.code)}</span></span></div><span class="tag ${r.priority}">${r.priority}</span></div><div>${(r.issue_types||[]).map(x=>`<span class="tag">${esc(x)}</span>`).join('')}</div><div class="path"><div><div class="label">旧报告路径</div>${esc(r.old_path)}</div><div><div class="label">建议新分类</div><b>${esc(r.new_path)}</b></div></div><div class="section"><div class="section-title">进入队列原因</div><div class="text">${reasons||'无'}</div></div><div class="section"><div class="section-title">下一步证据卡需要补齐</div><div class="todo"><div>主营业务：官网/年报一句话证据</div><div>收入结构：主营产品或业务占比</div><div>分类判断：为什么放入当前新节点</div><div>报告处理：V2 / 旧版 / 暂未生成的入口状态</div></div></div><div class="section"><div class="section-title">处理建议</div><div class="text warn">${esc(r.recommended_action)}</div></div></article>`}
function render(){const rows=list();$('cards').innerHTML=rows.length?`<div class="grid">${rows.map(card).join('')}</div>`:'<div class="empty">没有匹配结果</div>'}
document.querySelectorAll('[data-f]').forEach(b=>b.onclick=()=>{filter=b.dataset.f;document.querySelectorAll('[data-f]').forEach(x=>x.classList.remove('primary'));b.classList.add('primary');render()});$('q').oninput=e=>{q=e.target.value;render()};renderMetrics();render();
</script></body></html>
