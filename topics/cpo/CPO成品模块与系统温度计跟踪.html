solid #d8dde7;border-radius:8px;overflow:auto}table{width:100%;border-collapse:collapse;min-width:1450px}th,td{border-bottom:1px solid #d8dde7;padding:10px;text-align:left;vertical-align:top;font-size:13px;line-height:1.5}th{background:#f1f4f8}@media(max-width:1200px){.bar{grid-template-columns:1fr}.cards{grid-template-columns:1fr 1fr}.metrics{grid-template-columns:repeat(2,1fr)}}@media(max-width:720px){.cards{grid-template-columns:1fr}}</style>

<header class="cpo-public-top"><div class="cpo-public-top__title">CPO成品模块与系统温度计跟踪</div><nav class="cpo-public-top__links"><a href="../../index.html">网站首页</a><a href="./index.html?v=visual2">CPO中枢</a><a href="./CPO全产业链详细全图_产业链版.html?v=visual2">产业链图</a><a href="./CPO关键约束环节总表.html?v=visual2">关键约束</a><a href="./CPO公司资料池.html?v=visual2">公司资料</a></nav></header><header><div class="bar"><div><h1>CPO成品模块与系统温度计跟踪</h1><p class="sub">这张表不用于追成品光模块，而是用成品模块和系统硬件观察产业热度是否真实、是否已经关注度较高、资金是否可能向光源、硅光、FAU/AWG、光引擎封装和测试设备扩散。</p></div><div class="filters"><input id="q" placeholder="搜索公司/证据"><select id="grp"><option value="all">全部温度计</option><option value="成品模块温度计">成品模块</option><option value="系统温度计">系统温度计</option><option value="系统扩散温度计">系统扩散</option></select><select id="access"><option value="all">全部板块角色</option><option value="主板样本">主板样本</option><option value="非主板样本">非主板样本</option></select><select id="risk"><option value="all">全部阶段位置观察</option><option value="高">高风险</option><option value="中高">中高风险</option><option value="低">低/中风险</option></select></div></div></header><main><section class='panel'><div class='content note'>本页内容用于产业链研究展示；公司名称、相关度、阶段标签、观察顺序和路线映射均为研究标签，不代表事实认定、证券评级或投资建议。</div></section><section class="metrics" id="metrics"></section><section class="cards" id="cards"></section><section class="table"><table id="tbl"></table></section></main><script>const data=window.CPO_MODULE_SYSTEM_TEMPERATURE||[];const el=id=>document.getElementById(id);function pct(v){const n=parseFloat(String(v||'').replace('%',''));return Number.isFinite(n)?n:0}function filtered(){const q=el('q').value.trim().toLowerCase(),g=el('grp').value,a=el('access').value,r=el('risk').value;return data.filter(x=>Object.values(x).join(' ').toLowerCase().includes(q)&&(g==='all'||x.group===g)&&(a==='all'||(a==='主板样本'?x.userAccess.startsWith('主板样本'):x.userAccess.startsWith('非主板样本')))&&(r==='all'||(r==='高'?x.chaseRisk==='高':r==='中高'?x.chaseRisk==='中高':!['高','中高'].includes(x.chaseRisk))))}function render(){const rs=filtered();const m=[['公司数',rs.length],['主板样本',rs.filter(x=>x.userAccess.startsWith('主板样本')).length],['成品模块',rs.filter(x=>x.group==='成品模块温度计').length],['强证据',rs.filter(x=>x.evidenceGrade.includes('强')).length],['60日>100%',rs.filter(x=>pct(x.ret60d)>100).length],['高追涨风险',rs.filter(x=>x.chaseRisk==='高').length]];el('metrics').innerHTML=m.map(x=>`<div class="metric"><span>${x[0]}</span><b>${x[1]}</b></div>`).join('');el('cards').innerHTML=rs.map(x=>{const hot=x.chaseRisk==='高'||x.chaseRisk==='中高';return `<article class="card ${x.bottleneck[0]}"><h2>${x.name}</h2><div class="tags"><span class="tag green">${x.userAccess}</span><span class="tag">${x.group}</span><span class="tag ${hot?'red':'orange'}">阶段位置 ${x.chaseRisk}</span><span class="tag">60日 ${x.ret60d}</span><span class="tag">回撤 ${x.drawdownFrom60dHigh}</span></div><div><div class="label">定位</div><div class="field">${x.layer}</div></div><div><div class="label">温度计用途</div><div class="field">${x.temperatureUse}</div></div><div><div class="label">上游解读</div><div class="field">${x.upstreamRead}</div></div><div><div class="label">观察</div><div class="field">${x.judgement}</div></div></article>`}).join('');const hs=['公司','板块','分组','定位','官方证据','业绩信号','行情','阶段位置','温度计用途','上游解读','下一步'];el('tbl').innerHTML=`<thead><tr>${hs.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rs.map(x=>`<tr><td>${x.name}<br>${x.code}</td><td>${x.userAccess}</td><td>${x.group}</td><td>${x.layer}<br>${x.chainRole}</td><td>${x.evidenceGrade}<br>${x.officialEvidence}</td><td>${x.earningsSignal}</td><td>5日 ${x.ret5d}<br>20日 ${x.ret20d}<br>60日 ${x.ret60d}<br>距高点 ${x.drawdownFrom60dHigh}</td><td>${x.chaseRisk}<br>${x.positionState}</td><td>${x.temperatureUse}</td><td>${x.upstreamRead}</td><td>${x.nextReview}</td></tr>`).join('')}</tbody>`}['q','grp','access','risk'].forEach(id=>el(id).addEventListener('input',render));render();</script><!-- CPO_DASHBOARD_DOCK_START -->
