<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>batch_001 V2报告质检</title><script src="core9_v2_report_batch_001_qc_v1.js"></script><style>body{margin:0;background:#f7f8fb;color:#111827;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif}header{background:#111827;color:white;padding:22px 28px}h1{margin:0 0 8px;font-size:24px}.sub{color:#d1d5db;font-size:13px}main{padding:22px 28px}.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin:0 0 18px}.metric{background:white;border:1px solid #e5e7eb;border-radius:8px;padding:12px}.metric b{display:block;font-size:22px}.metric span{font-size:12px;color:#667085}.card{background:white;border:1px solid #e5e7eb;border-radius:8px;padding:14px;margin-bottom:12px}a{color:#1d4ed8;text-decoration:none}.tag{display:inline-flex;border-radius:999px;padding:3px 8px;font-size:12px;background:#f3f4f6;color:#374151}.ok{background:#dcfce7;color:#166534}.bad{background:#fee2e2;color:#991b1b}table{width:100%;border-collapse:collapse;background:white}th,td{border-bottom:1px solid #e5e7eb;padding:9px 10px;text-align:left;font-size:13px;vertical-align:top}th{background:#f3f4f6}.small{font-size:12px;color:#667085}</style></head><body><header><h1>batch_001 V2报告质检</h1><div class="sub" id="sub"></div></header><main><div id="app"></div></main><script>function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))}function metric(l,v){return '<div class="metric"><b>'+esc(v)+'</b><span>'+esc(l)+'</span></div>'}const d=CORE9_V2_REPORT_BATCH_001_QC_V1;document.getElementById('sub').textContent=d.purpose+' · '+d.generated_at;document.getElementById('app').innerHTML='<div class="summary">'+metric('总数',d.summary.total)+metric('通过',d.summary.pass)+metric('需复核',d.summary.need_review)+'</div><table><thead><tr><th>公司</th><th>字数</th><th>九章</th><th>财务前置</th><th>合作对象规则</th><th>禁用词</th><th>结果</th></tr></thead><tbody>'+d.rows.map(r=>'<tr><td><a href="'+esc(r.html_path)+'" target="_blank">'+esc(r.code)+' '+esc(r.name)+'</a></td><td>'+esc(r.text_chars)+'</td><td>'+esc(r.chapters_count)+'</td><td>'+esc(r.has_front_financials?'是':'否')+'</td><td>'+esc(r.has_partner_rule?'是':'否')+'</td><td>'+esc((r.forbidden_words||[]).join('、')||'无')+'</td><td><span class="tag '+(r.pass?'ok':'bad')+'">'+esc(r.note)+'</span></td></tr>').join('')+'</tbody></table>';</script></body></html>
