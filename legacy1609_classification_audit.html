<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>1609旧报告分类体检</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;background:#0d1117;color:#d7dee9}a{color:#79c0ff;text-decoration:none}.top{position:sticky;top:0;z-index:10;background:#0d1117;border-bottom:1px solid #242b35}.top-inner{max-width:1500px;margin:0 auto;padding:14px 18px;display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}h1{font-size:21px;color:#f0f6fc}.sub{font-size:12px;color:#8b949e;margin-top:4px}.nav{display:flex;gap:8px;flex-wrap:wrap}.btn{border:1px solid #30363d;background:#161b22;color:#c9d1d9;border-radius:8px;padding:8px 10px;font-size:12px;cursor:pointer}.btn.active,.btn:hover{border-color:#58a6ff;color:#fff;background:#10233a}.wrap{max-width:1500px;margin:0 auto;padding:18px}.summary{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px;margin-bottom:14px}.metric{background:#161b22;border:1px solid #242b35;border-radius:8px;padding:12px}.metric b{display:block;font-size:24px;color:#f0f6fc}.metric span{font-size:12px;color:#8b949e}.panel{background:#161b22;border:1px solid #242b35;border-radius:8px;padding:14px;margin-bottom:14px}.note{font-size:13px;line-height:1.7;color:#b7c2ce}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.toolbar input{flex:1;min-width:260px;background:#0f141b;border:1px solid #30363d;border-radius:8px;padding:9px 12px;color:#d7dee9}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(460px,1fr));gap:12px}.card{background:#0f141b;border:1px solid #242b35;border-left:4px solid #657487;border-radius:8px;padding:13px}.card.P0{border-left-color:#e5534b}.card.P1{border-left-color:#d49a2f}.card.P2{border-left-color:#3e72c8}.name{font-size:16px;font-weight:800;color:#f0f6fc;margin-bottom:6px}.path{font-size:13px;color:#b7c2ce;line-height:1.55;margin:8px 0}.pill-row{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}.pill{border:1px solid #394451;background:#161b22;border-radius:999px;padding:3px 8px;font-size:12px;color:#9da7b3}.pill.P0{border-color:#e5534b;color:#ffb4ad;background:#351717}.pill.P1{border-color:#8a6a1f;color:#ffd36a;background:#332600}.pill.P2{border-color:#3e72c8;color:#a7c7ff;background:#10233a}.text{font-size:13px;line-height:1.65;color:#c9d1d9}.section-title{font-size:12px;color:#8b949e;margin-top:10px;margin-bottom:5px}.empty{text-align:center;color:#8b949e;padding:26px}@media(max-width:900px){.summary{grid-template-columns:repeat(2,minmax(0,1fr))}.grid{grid-template-columns:1fr}}
</style></head><body>
<header class="top"><div class="top-inner"><div><h1>1609旧报告分类体检</h1><div class="sub" id="sub"></div></div><div class="nav"><a class="btn" href="index_v2_delivery.html?v=reclass2">公开首页</a><a class="btn" href="legacy1609_p0_p1_evidence_workbench.html?v=workbench1">P0/P1证据工作台</a><a class="btn" href="legacy_report_quality_queue.html">旧报告质量队列</a></div></div></header>
<main class="wrap"><div class="summary" id="summary"></div><section class="panel"><div class="note">这页专门检查旧报告接入后的分类可信度。P0 不是直接判定错误，而是“需要优先补证据卡/人工确认”的队列；旧报告会继续保留，但在公开首页里应保持低权重和待升级标识。</div></section><section class="panel"><div class="toolbar"><button class="btn active" data-f="all">全部</button><button class="btn" data-f="P0">P0</button><button class="btn" data-f="P1">P1</button><button class="btn" data-f="known">回归样本</button><button class="btn" data-f="conflict">旧新冲突</button><input id="q" placeholder="搜索公司 / 代码 / 节点 / 旧路径"></div><div id="cards"></div></section></main>
<script src="legacy1609_classification_audit_v1.js"></script>
<script>
const DATA=LEGACY1609_CLASSIFICATION_AUDIT_V1;let filter='all',q='';const $=id=>document.getElementById(id);
function esc(v){return String(v==null||v===''?'无':v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function pill(t,c){return `<span class="pill ${c||''}">${esc(t)}</span>`}
function renderSummary(){const s=DATA.summary;$('sub').textContent=`生成时间 ${DATA.generated_at} · 覆盖 ${s.total} 家旧报告接入股票`;$('summary').innerHTML=[['总数',s.total],['P0',s.P0],['P1',s.P1],['P2',s.P2],['旧新冲突',s.old_new_conflict],['回归样本',s.known_corrected_sample]].map(x=>`<div class="metric"><b>${esc(x[1])}</b><span>${esc(x[0])}</span></div>`).join('')}
function rows(){const term=q.trim().toLowerCase();return DATA.rows.filter(r=>{if(filter==='P0'&&r.priority!=='P0')return false;if(filter==='P1'&&r.priority!=='P1')return false;if(filter==='known'&&!(r.issue_types||[]).includes('known_corrected_sample'))return false;if(filter==='conflict'&&!(r.issue_types||[]).includes('old_new_conflict'))return false;if(!term)return true;return [r.code,r.name,r.old_path,r.new_path,r.new_node_name].join(' ').toLowerCase().includes(term)}).slice(0,220)}
function card(r,i){return `<article class="card ${r.priority}"><div class="name">#${i+1} ${esc(r.name)} <span class="sub">${esc(r.code)}</span></div><div class="pill-row">${pill(r.priority,r.priority)}${pill('分数 '+r.score,r.priority)}${(r.issue_types||[]).map(x=>pill(x)).join('')}</div><div class="path">${esc(r.old_path)} → ${esc(r.new_path)}</div><div class="section-title">理由</div><div class="text">${(r.reasons||[]).map(esc).join('；')}</div><div class="section-title">建议</div><div class="text">${esc(r.recommended_action)}</div><div class="section-title">关键词命中</div><div class="text">${esc((r.alias_hits||[]).join('、')||'无')}</div>${r.report_path?`<div class="pill-row"><a class="btn" href="${encodeURI(r.report_path)}">打开旧报告</a></div>`:''}</article>`}
function render(){const list=rows();$('cards').innerHTML=list.length?`<div class="grid">${list.map(card).join('')}</div>`:'<div class="empty">没有匹配结果</div>'}
document.querySelectorAll('[data-f]').forEach(b=>b.onclick=()=>{filter=b.dataset.f;document.querySelectorAll('[data-f]').forEach(x=>x.classList.remove('active'));b.classList.add('active');render()});$('q').oninput=e=>{q=e.target.value;render()};renderSummary();render();
</script></body></html>
